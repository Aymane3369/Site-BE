<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma Avatar</title>
    <style>
        * { margin: 0; padding: 0; }
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden;
            background: #0d0d0d;
        }
        #app {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
        }
        #app iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d0d0d;
            color: #fff;
            z-index: 999;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }
        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid #333;
            border-top: 4px solid #7c3aed;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .btn-retry {
            margin-top: 20px;
            padding: 12px 30px;
            background: #7c3aed;
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="font-size:1.2rem;">Chargement de Gemma Avatar...</p>
        <p style="font-size:0.8rem;color:#666;margin-top:10px;">Accès au micro en cours...</p>
        <button class="btn-retry" id="retryBtn">🔄 Réessayer</button>
    </div>

    <div id="app">
        <iframe
            id="app-iframe"
            src="https://victor-gemma-avatar.hf.space"
            allow="microphone; camera; clipboard-read; clipboard-write; autoplay"
            allowfullscreen
        ></iframe>
    </div>

    <script>
        const iframe = document.getElementById('app-iframe');
        const loader = document.getElementById('loader');
        const retryBtn = document.getElementById('retryBtn');

        // Cache le loader quand l'iframe est chargée
        iframe.addEventListener('load', function() {
            loader.style.display = 'none';
        });

        // Si l'utilisateur clique sur réessayer
        retryBtn.addEventListener('click', function() {
            // Recharge l'iframe
            iframe.src = iframe.src;
            loader.style.display = 'flex';
        });

        // Timeout de sécurité : cacher le loader après 10s
        setTimeout(() => {
            loader.style.display = 'none';
        }, 10000);
    </script>

</body>
</html>
