<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemma Avatar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0d0d0d;
            font-family: Arial, sans-serif;
        }
        #app-container {
            width: 100vw;
            height: 100vh;
            height: 100dvh; /* Pour mobile : tient compte de la barre d'adresse */
            display: flex;
            flex-direction: column;
            background: #0d0d0d;
        }
        #app-iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: #0d0d0d;
        }
        /* Optionnel : barre de chargement */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d0d0d;
            color: #fff;
            font-size: 1.2rem;
            z-index: 999;
            transition: opacity 0.8s ease;
        }
        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 40px;
            height: 40px;
            margin-right: 15px;
            border: 4px solid #333;
            border-top: 4px solid #7c3aed;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* Correction pour iOS Safari */
        @supports (-webkit-touch-callout: none) {
            #app-container {
                height: -webkit-fill-available;
            }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <span>Chargement de Gemma Avatar...</span>
    </div>

    <div id="app-container">
        <iframe
            id="app-iframe"
            src="https://victor-gemma-avatar.hf.space"
            allow="microphone; camera; clipboard-read; clipboard-write; autoplay"
            allowfullscreen
            loading="lazy"
            importance="high"
        ></iframe>
    </div>

    <script>
        // Cache le loader quand l'iframe est chargée
        const iframe = document.getElementById('app-iframe');
        const loader = document.getElementById('loader');

        iframe.addEventListener('load', function() {
            loader.classList.add('hidden');
        });

        // Sécurité : si l'iframe ne charge pas au bout de 15s, on cache quand même
        setTimeout(() => {
            loader.classList.add('hidden');
        }, 15000);

        // Pour mobile : forcer le plein écran au toucher (facultatif)
        document.addEventListener('touchstart', function() {
            if (document.documentElement.requestFullscreen) {
                // décommenter si vous voulez un plein écran automatique
                // document.documentElement.requestFullscreen().catch(() => {});
            }
        }, { once: true });
    </script>

</body>
</html>
