<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemma Avatar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0d0d0d;
            color: #fff;
            overflow: hidden;
        }
        
        /* Bannière de retour fixe en haut */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(13, 13, 13, 0.92);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #1a1a1a;
            backdrop-filter: blur(10px);
        }
        
        .top-bar .back-btn {
            color: #fff;
            font-size: 1.4rem;
            text-decoration: none;
            padding: 4px 10px;
            border-radius: 8px;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.95rem;
        }
        
        .top-bar .back-btn:hover {
            background: rgba(255,255,255,0.08);
        }
        
        .top-bar .title {
            font-size: 1rem;
            font-weight: 600;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            flex: 1;
        }
        
        .top-bar .status {
            color: #666;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .top-bar .status .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block;
            background: #22c55e;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }
        
        /* Conteneur qui prend tout l'écran sous la barre */
        #container {
            margin-top: 52px;
            width: 100vw;
            height: calc(100vh - 52px);
            height: calc(100dvh - 52px);
            background: #0d0d0d;
        }
        
        #app-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #0d0d0d;
            display: block;
        }
        
        /* Écran de chargement */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0d0d0d;
            z-index: 999;
            color: #fff;
            transition: opacity 0.5s;
        }
        
        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid #1a1a1a;
            border-top: 4px solid #7c3aed;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        #loader p {
            font-size: 1.1rem;
        }
        
        #loader .sub {
            color: #666;
            font-size: 0.85rem;
            margin-top: 8px;
        }
        
        /* Message d'erreur */
        #error-box {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.92);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px 20px;
            z-index: 1001;
            max-width: 90%;
            text-align: center;
            font-size: 0.85rem;
            color: #f87171;
            line-height: 1.5;
        }
        
        #error-box .btn-close {
            margin-top: 10px;
            padding: 8px 25px;
            background: #7c3aed;
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        @supports (-webkit-touch-callout: none) {
            #container { height: -webkit-fill-available; }
        }
    </style>
</head>
<body>

    <!-- Loader -->
    <div id="loader">
        <div class="spinner"></div>
        <p>Connexion à Gemma Avatar...</p>
        <p class="sub">Préparation de l'interface</p>
    </div>

    <!-- Barre de retour -->
    <div class="top-bar">
        <button class="back-btn" id="backBtn">← Retour</button>
        <span class="title">🎤 Gemma Avatar</span>
        <span class="status">
            <span class="dot"></span>
            En ligne
        </span>
    </div>

    <!-- Conteneur -->
    <div id="container">
        <iframe
            id="app-iframe"
            src="https://victor-gemma-avatar.hf.space"
            allow="microphone; camera; clipboard-read; clipboard-write; autoplay"
            allowfullscreen
            loading="eager"
        ></iframe>
    </div>

    <!-- Boîte d'erreur -->
    <div id="error-box">
        <span>⚠️ Le micro est bloqué par l'application.</span><br>
        <span style="color:#aaa;font-size:0.8rem;">Autorisez le micro dans les paramètres de votre téléphone.</span>
        <br>
        <button class="btn-close" id="errorCloseBtn">Compris</button>
    </div>

    <script>
        const APP_URL = 'https://victor-gemma-avatar.hf.space';
        const iframe = document.getElementById('app-iframe');
        const loader = document.getElementById('loader');
        const errorBox = document.getElementById('error-box');
        const backBtn = document.getElementById('backBtn');
        const errorCloseBtn = document.getElementById('errorCloseBtn');

        let iframeLoaded = false;

        // === Cache le loader quand l'iframe est chargée ===
        iframe.addEventListener('load', function() {
            iframeLoaded = true;
            loader.classList.add('hidden');
            console.log('✅ Iframe chargée');
            
            // Détecter si le micro est bloqué dans l'iframe
            try {
                // Tenter d'injecter un script dans l'iframe pour détecter l'état du micro
                const iframeWindow = iframe.contentWindow;
                if (iframeWindow) {
                    // On écoute les messages de l'iframe
                    window.addEventListener('message', function(event) {
                        if (event.data && event.data.type === 'mic_status') {
                            if (event.data.status === 'blocked') {
                                errorBox.style.display = 'block';
                            }
                        }
                    });
                }
            } catch (e) {
                // Cross-origin, on ignore
                console.log('Cross-origin, impossible d\'injecter');
            }
        });

        // === Erreur de chargement ===
        iframe.addEventListener('error', function() {
            loader.classList.add('hidden');
            errorBox.style.display = 'block';
            errorBox.innerHTML = `
                <span>❌ Impossible de charger Gemma Avatar.</span><br>
                <span style="color:#aaa;font-size:0.8rem;">Vérifiez votre connexion internet.</span>
                <br>
                <button class="btn-close" onclick="location.reload()">🔄 Réessayer</button>
            `;
        });

        // === Timeout de sécurité ===
        setTimeout(function() {
            if (!iframeLoaded) {
                loader.classList.add('hidden');
                errorBox.style.display = 'block';
            }
        }, 12000);

        // === Bouton Retour ===
        backBtn.addEventListener('click', function() {
            // Retourner à l'espace détente
            window.location.href = 'espace-détente.html';
        });

        // === Fermer l'erreur ===
        errorCloseBtn.addEventListener('click', function() {
            errorBox.style.display = 'none';
        });

        // === Gestion du bouton retour Android ===
        document.addEventListener('backbutton', function(e) {
            e.preventDefault();
            window.location.href = 'espace-détente.html';
        });

        // === Pour les appareils qui nécessitent un geste ===
        // Si l'utilisateur tape sur l'écran, on essaie de forcer le micro
        document.addEventListener('click', async function() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(t => t.stop());
                console.log('✅ Micro actif');
                // Recharger l'iframe pour qu'elle détecte le micro
                iframe.src = iframe.src;
            } catch (err) {
                console.warn('❌ Micro toujours bloqué');
            }
        }, { once: true });

        // === Détecter si l'utilisateur clique sur "Start talking" ===
        // On écoute les clics globaux pour détecter l'interaction
        document.addEventListener('click', function() {
            // Si l'erreur est affichée, on la cache après un délai
            setTimeout(() => {
                if (errorBox.style.display === 'block') {
                    // L'utilisateur a cliqué, peut-être que le micro est maintenant autorisé
                    iframe.src = iframe.src;
                }
            }, 3000);
        });

        console.log('🔵 Gemma Avatar - Mode plein écran');
        console.log(`🔵 URL: ${APP_URL}`);
    </script>
</body>
</html>
