<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemma Avatar</title>
    
    <!-- Capacitor -->
    <script src="https://unpkg.com/@capacitor/core@latest/dist/globals.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0d0d0d;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        
        /* Barre de navigation (style des autres jeux) */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(13, 13, 13, 0.95);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1a1a1a;
            backdrop-filter: blur(10px);
        }
        
        .navbar .back-btn {
            color: #fff;
            font-size: 1.4rem;
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 8px;
            transition: background 0.3s;
        }
        
        .navbar .back-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .navbar .title {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .navbar .status {
            color: #666;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .navbar .status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .navbar .status .dot.online {
            background: #22c55e;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        /* Conteneur principal */
        #container {
            margin-top: 60px; /* Hauteur de la navbar */
            width: 100vw;
            height: calc(100vh - 60px);
            height: calc(100dvh - 60px);
            background: #0d0d0d;
        }
        
        #app-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #0d0d0d;
        }
        
        /* Loader */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d0d0d;
            color: #fff;
            z-index: 999;
            flex-direction: column;
            transition: opacity 0.5s ease;
        }
        
        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid #1a1a1a;
            border-top: 4px solid #7c3aed;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Permission prompt */
        #permission-prompt {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            color: #fff;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            text-align: center;
            padding: 30px;
        }
        
        #permission-prompt .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        #permission-prompt h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        
        #permission-prompt p {
            color: #aaa;
            max-width: 350px;
            margin: 10px auto;
            line-height: 1.6;
        }
        
        #permission-prompt .btn {
            margin-top: 20px;
            padding: 16px 45px;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
            transition: transform 0.2s;
        }
        
        #permission-prompt .btn:active {
            transform: scale(0.95);
        }
        
        #permission-prompt .btn-secondary {
            background: transparent;
            box-shadow: none;
            border: 1px solid #333;
            margin-top: 10px;
            padding: 12px 30px;
            font-size: 0.9rem;
        }
        
        /* Responsive */
        @supports (-webkit-touch-callout: none) {
            #container {
                height: -webkit-fill-available;
            }
        }
    </style>
</head>
<body>

    <!-- Loader -->
    <div id="loader">
        <div class="spinner"></div>
        <p style="font-size:1.2rem;">Chargement de Gemma Avatar...</p>
        <p style="color:#666;font-size:0.85rem;margin-top:10px;">Intelligence artificielle vocale</p>
    </div>

    <!-- Permission Prompt -->
    <div id="permission-prompt">
        <div class="icon">🎤</div>
        <h2>Accès au micro requis</h2>
        <p>Gemma Avatar a besoin d'accéder à votre micro pour interagir vocalement.</p>
        <button class="btn" id="grantBtn">✅ Autoriser le micro</button>
        <button class="btn btn-secondary" id="retryBtn">🔄 Réessayer</button>
    </div>

    <!-- Navbar (comme les autres jeux) -->
    <nav class="navbar">
        <a href="espace-détente.html" class="back-btn">←</a>
        <span class="title">🎤 Gemma Avatar</span>
        <span class="status">
            <span class="dot online"></span>
            En ligne
        </span>
    </nav>

    <!-- Conteneur de l'application -->
    <div id="container">
        <iframe
            id="app-iframe"
            src="https://victor-gemma-avatar.hf.space"
            allow="microphone; camera; clipboard-read; clipboard-write; autoplay"
            allowfullscreen
            loading="lazy"
        ></iframe>
    </div>

    <script>
        // === Configuration ===
        const APP_URL = 'https://victor-gemma-avatar.hf.space';
        const iframe = document.getElementById('app-iframe');
        const loader = document.getElementById('loader');
        const permissionPrompt = document.getElementById('permission-prompt');
        const grantBtn = document.getElementById('grantBtn');
        const retryBtn = document.getElementById('retryBtn');

        // === Détection Capacitor ===
        const isCapacitor = typeof Capacitor !== 'undefined' && Capacitor.getPlatform;
        const platform = isCapacitor ? Capacitor.getPlatform() : 'web';
        const isAndroid = platform === 'android';

        console.log(`Platform: ${platform}, isAndroid: ${isAndroid}`);

        // === Cache le loader quand l'iframe est chargée ===
        iframe.addEventListener('load', function() {
            loader.classList.add('hidden');
        });

        // Timeout de sécurité
        setTimeout(() => {
            loader.classList.add('hidden');
        }, 10000);

        // === Gestion des permissions Capacitor ===
        async function requestCapacitorPermission() {
            if (!isAndroid) {
                permissionPrompt.style.display = 'none';
                return;
            }

            try {
                // Vérifier si Permissions est disponible
                if (typeof Capacitor.Plugins !== 'undefined' && Capacitor.Plugins.Permissions) {
                    const { Permissions } = Capacitor.Plugins;
                    
                    const status = await Permissions.checkPermissions();
                    console.log('Status permissions:', status);
                    
                    if (status.microphone === 'granted') {
                        permissionPrompt.style.display = 'none';
                        // Recharge l'iframe pour qu'elle détecte le micro
                        iframe.src = iframe.src;
                    } else {
                        permissionPrompt.style.display = 'flex';
                    }
                } else {
                    // Plugin non trouvé, on cache quand même
                    permissionPrompt.style.display = 'none';
                }
            } catch (error) {
                console.error('Erreur Capacitor:', error);
                permissionPrompt.style.display = 'none';
            }
        }

        // === Demander la permission au clic ===
        grantBtn.addEventListener('click', async function() {
            if (isAndroid) {
                try {
                    if (typeof Capacitor.Plugins !== 'undefined' && Capacitor.Plugins.Permissions) {
                        const { Permissions } = Capacitor.Plugins;
                        
                        const result = await Permissions.requestPermissions({
                            permissions: ['microphone']
                        });
                        
                        if (result.microphone === 'granted') {
                            permissionPrompt.style.display = 'none';
                            iframe.src = iframe.src;
                            loader.classList.remove('hidden');
                            setTimeout(() => loader.classList.add('hidden'), 3000);
                        } else {
                            alert('Le micro est nécessaire pour utiliser Gemma Avatar.');
                        }
                    } else {
                        // Fallback : essayer via l'API Web
                        try {
                            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                            stream.getTracks().forEach(t => t.stop());
                            permissionPrompt.style.display = 'none';
                            iframe.src = iframe.src;
                        } catch (err) {
                            alert('Veuillez autoriser le micro dans les paramètres de l\'application.');
                        }
                    }
                } catch (error) {
                    console.error('Erreur:', error);
                    alert('Impossible de demander la permission. Vérifiez les paramètres.');
                }
            }
        });

        // === Réessayer ===
        retryBtn.addEventListener('click', function() {
            iframe.src = APP_URL;
            loader.classList.remove('hidden');
            setTimeout(() => loader.classList.add('hidden'), 5000);
        });

        // === Initialisation ===
        document.addEventListener('DOMContentLoaded', function() {
            if (isAndroid) {
                // Attendre que Capacitor soit chargé
                document.addEventListener('deviceready', function() {
                    console.log('🔵 deviceready triggered');
                    requestCapacitorPermission();
                });
                
                // Fallback si deviceready ne se déclenche pas
                setTimeout(function() {
                    console.log('🔵 Fallback timeout');
                    requestCapacitorPermission();
                }, 3000);
            } else {
                permissionPrompt.style.display = 'none';
            }
        });

        // === Gestion des erreurs de l'iframe ===
        iframe.addEventListener('error', function() {
            console.error('❌ Erreur de chargement de l\'iframe');
            loader.classList.add('hidden');
        });

        // === Fallback : Forcer la demande de micro via l'API Web ===
        async function forceWebMicro() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(t => t.stop());
                console.log('✅ Micro fonctionne (via API Web)');
                // Recharge l'iframe
                iframe.src = iframe.src;
            } catch (err) {
                console.warn('❌ Micro refusé (via API Web):', err);
            }
        }

        // Lance après un délai
        setTimeout(forceWebMicro, 2000);
    </script>

</body>
</html>
