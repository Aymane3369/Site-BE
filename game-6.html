<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingénierie Structure AI - Infini</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .app { width: 100%; max-width: 700px; height: 100vh; display: flex; flex-direction: column; background-color: #ffffff; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        header { background-color: #2c3e50; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        header h1 { font-size: 1.2rem; }
        .header-actions { display: flex; gap: 8px; }
        .header-actions button { background: #e74c3c; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .config { padding: 8px 16px; background-color: #ecf0f1; border-bottom: 1px solid #ddd; font-size: 12px; color: #7f8c8d; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
        .config .status { font-weight: bold; }
        .config .status.online { color: #27ae60; }
        .config .status.fallback { color: #f39c12; }
        .config .status.error { color: #e74c3c; }
        .config .status.knowledge { color: #8e44ad; }
        #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .message.user { align-self: flex-end; background-color: #2980b9; color: white; }
        .message.assistant { align-self: flex-start; background-color: #e8eaed; color: #222; }
        .message.system-note { align-self: center; color: #999; font-size: 11px; font-style: italic; }
        #chat-form { display: flex; padding: 12px; border-top: 1px solid #ddd; gap: 8px; }
        #user-input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; resize: none; font-family: inherit; }
        #send-btn { padding: 10px 20px; background-color: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; }
        #send-btn:disabled { background-color: #95a5a6; cursor: not-allowed; }
        .loading-dots::after { content: '...'; animation: dots 1.5s steps(3) infinite; }
        @keyframes dots { 0% { content: ''; } 33% { content: '.'; } 66% { content: '..'; } 100% { content: '...'; } }
    </style>
</head>
<body>

<div class="app">
    <header>
        <h1>🏗 Ingénierie Structure AI</h1>
        <div class="header-actions">
            <button id="reset-btn">🔄 Reset</button>
        </div>
    </header>
    <div class="config">
        <span>Statut : <span id="status-text" class="status online">Prêt</span></span>
        <span id="memory-indicator">🧠 0 messages</span>
    </div>
    <div id="messages"></div>
    <form id="chat-form">
        <textarea id="user-input" rows="1" placeholder="Posez votre question technique..." required></textarea>
        <button id="send-btn" type="submit">Envoyer</button>
    </form>
</div>

<script>
    // ===================== CONFIGURATION =====================
    const GROQ_API_KEY = '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';
    const HF_API_TOKEN = '';  // Optionnel
    const OPENROUTER_API_KEY = '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';
    const DEEPSEEK_API_KEY = 'sk-b09a3e6bb30f4174b43de7ee821207db';

    const MAX_CONTEXT_MESSAGES = 8;
    const MAX_RETRIES = 2;

    // ===================== BASE DE CONNAISSANCES (FAQ TECHNIQUE) =====================
    const knowledgeBase = [
        // Eurocodes
        { keywords: ['eurocode 0', 'eurocode0'], answer: "L'Eurocode 0 (EN 1990) définit les principes de base et les méthodes de calcul pour la fiabilité des structures." },
        { keywords: ['eurocode 1', 'eurocode1', 'charges'], answer: "L'Eurocode 1 (EN 1991) traite des actions sur les structures : charges permanentes, d'exploitation, neige, vent, séisme, etc." },
        { keywords: ['eurocode 2', 'eurocode2', 'béton armé'], answer: "L'Eurocode 2 (EN 1992) concerne le calcul des structures en béton armé et précontraint." },
        { keywords: ['eurocode 3', 'eurocode3', 'acier'], answer: "L'Eurocode 3 (EN 1993) régit le calcul des structures en acier." },
        { keywords: ['eurocode 7', 'eurocode7', 'géotechnique'], answer: "L'Eurocode 7 (EN 1997) traite des calculs géotechniques : fondations, murs de soutènement, etc." },
        // Béton
        { keywords: ['béton', 'beton', 'résistance'], answer: "La résistance caractéristique du béton est notée f_ck (ex: C25/30). La résistance de calcul est f_cd = α_cc * f_ck / γ_c." },
        { keywords: ['acier', 'armature', 'ferraillage'], answer: "La limite d'élasticité de l'acier est notée f_sk. La contrainte de calcul est f_sd = f_sk / γ_s." },
        { keywords: ['poutre', 'flèche'], answer: "La flèche d'une poutre simplement appuyée sous charge uniforme est : f = (5/384) * (q * L^4) / (E * I)." },
        { keywords: ['fondation', 'semelle'], answer: "Une semelle de fondation transmet les charges au sol. La contrainte de contact doit vérifier σ ≤ q_net." },
        // Calculs
        { keywords: ['descente de charges'], answer: "La descente de charges consiste à cumuler les charges permanentes et d'exploitation pour dimensionner les éléments porteurs." },
        { keywords: ['moment fléchissant'], answer: "Le moment fléchissant maximal pour une poutre bi-appuyée est M_max = (q * L^2) / 8." },
        { keywords: ['effort tranchant'], answer: "L'effort tranchant maximal est V_max = (q * L) / 2." },
        // Général
        { keywords: ['cm66'], answer: "Le CM66 est l'ancien règlement français pour les structures en acier. Il a été remplacé par les Eurocodes." },
        { keywords: ['bael 91'], answer: "Le BAEL 91 est l'ancien règlement français pour le béton armé. Il a été remplacé par l'Eurocode 2." },
        { keywords: ['ingénierie', 'travaux'], answer: "Ingénierie Travaux est le cabinet d'Aymane Abidine, expert en structures et génie civil." },
        // Contact
        { keywords: ['contacter', 'email', 'téléphone'], answer: "Vous pouvez contacter Aymane Abidine par e-mail : aymaneabidine@gmail.com ou par téléphone au 06 67 56 63 01." }
    ];

    function findKnowledgeAnswer(question) {
        const q = question.toLowerCase();
        let best = null;
        let bestScore = 0;
        for (const entry of knowledgeBase) {
            for (const kw of entry.keywords) {
                if (q.includes(kw)) {
                    const score = kw.length / q.length; // priorité aux mots longs et précis
                    if (score > bestScore) {
                        bestScore = score;
                        best = entry.answer;
                    }
                }
            }
        }
        return best;
    }

    // ===================== ÉTAT =====================
    let conversation = [];
    let isProcessing = false;

    // ===================== ÉLÉMENTS DOM =====================
    const messagesEl = document.getElementById('messages');
    const statusText = document.getElementById('status-text');
    const memoryIndicator = document.getElementById('memory-indicator');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const chatForm = document.getElementById('chat-form');
    const resetBtn = document.getElementById('reset-btn');

    // ===================== CHARGEMENT / SAUVEGARDE =====================
    function loadConversation() {
        const saved = localStorage.getItem('conversation_history');
        if (saved) {
            try {
                conversation = JSON.parse(saved);
                const hasSystem = conversation.some(msg => msg.role === 'system');
                if (!hasSystem) {
                    conversation.unshift({ role: 'system', content: systemPrompt() });
                }
            } catch (e) {
                conversation = [{ role: 'system', content: systemPrompt() }];
            }
        } else {
            conversation = [{ role: 'system', content: systemPrompt() }];
        }
        renderAllMessages();
        updateMemoryIndicator();
    }

    function saveConversation() {
        localStorage.setItem('conversation_history', JSON.stringify(conversation));
        updateMemoryIndicator();
    }

    function systemPrompt() {
        return `Tu es l'agent officiel d'Ingénierie Travaux (ingenierie-travaux.vercel.app). 
        Ton employeur est Aymane Abidine (Ingénieur Génie Civil).
        Tes missions :
        1. Assister Aymane Abidine dans ses études (Eurocodes, EXE, suivi de chantier).
        2. Accueillir les clients avec professionnalisme, clarté et pédagogie.
        3. PROTOCOLE D'URGENCE : Si une situation critique est signalée, tu dois confirmer que tu transmets une alerte prioritaire à Aymane Abidine (06 67 56 63 01 / aymaneabidine@gmail.com) et donner les consignes de sécurité immédiates.
        4. Tu as accès aux données d'Aymane (Lyon/Villeurbanne, expertise béton, Robot Structural Analysis, AutoCAD).`;
    }

    // ===================== AFFICHAGE =====================
    function renderAllMessages() {
        messagesEl.innerHTML = '';
        conversation.forEach(msg => {
            if (msg.role === 'system') return;
            renderMessage(msg.role, msg.content, false);
        });
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function renderMessage(role, content, save = true) {
        const div = document.createElement('div');
        div.className = 'message ' + role;
        div.textContent = content;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        if (save && role !== 'system-note') {
            conversation.push({ role, content });
            saveConversation();
        }
    }

    function updateMemoryIndicator() {
        const count = conversation.filter(m => m.role !== 'system').length;
        memoryIndicator.textContent = `🧠 ${count} messages`;
    }

    function setStatus(text, type = 'online') {
        statusText.textContent = text;
        statusText.className = 'status ' + type;
    }

    // ===================== CONSTRUCTION DU CONTEXTE =====================
    function buildMessages(userQuestion) {
        const contextMessages = conversation.filter(m => m.role !== 'system').slice(-MAX_CONTEXT_MESSAGES);
        return [
            { role: 'system', content: systemPrompt() },
            ...contextMessages,
            { role: 'user', content: userQuestion }
        ];
    }

    // ===================== APPELS API =====================
    async function callGroq(messages) {
        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + GROQ_API_KEY },
            body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages, temperature: 0.7 })
        });
        if (response.status === 429) throw new Error('Rate limit');
        if (!response.ok) throw new Error(`Groq error ${response.status}`);
        return (await response.json()).choices[0].message.content;
    }

    async function callHuggingFace(messages) {
        const prompt = messages.map(m => `${m.role}: ${m.content}`).join('\n') + '\nassistant:';
        const headers = { 'Content-Type': 'application/json' };
        if (HF_API_TOKEN) headers['Authorization'] = 'Bearer ' + HF_API_TOKEN;
        const response = await fetch('https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.3', {
            method: 'POST',
            headers,
            body: JSON.stringify({ inputs: prompt, parameters: { max_new_tokens: 1024, temperature: 0.7, return_full_text: false } })
        });
        if (!response.ok) throw new Error(`HF error ${response.status}`);
        const data = await response.json();
        return data[0]?.generated_text || data.generated_text || null;
    }

    async function callOpenRouter(messages) {
        if (!OPENROUTER_API_KEY) throw new Error('No OpenRouter key');
        const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + OPENROUTER_API_KEY,
                'HTTP-Referer': 'http://localhost',
                'X-Title': 'Ingénierie Structure AI'
            },
            body: JSON.stringify({ model: 'microsoft/phi-3-mini-128k-instruct:free', messages, temperature: 0.7 })
        });
        if (!response.ok) throw new Error(`OpenRouter error ${response.status}`);
        return (await response.json()).choices[0].message.content;
    }

    async function callDeepSeek(messages) {
        if (!DEEPSEEK_API_KEY) throw new Error('No DeepSeek key');
        const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DEEPSEEK_API_KEY },
            body: JSON.stringify({ model: 'deepseek-chat', messages, temperature: 0.7 })
        });
        if (!response.ok) throw new Error(`DeepSeek error ${response.status}`);
        return (await response.json()).choices[0].message.content;
    }

    // ===================== ORCHESTREUR AVEC FALLBACK (API → FAQ) =====================
    async function askAI(userQuestion) {
        const messages = buildMessages(userQuestion);

        // 1. Groq
        for (let attempt = 0; attempt < MAX_RETRIES; attempt++) {
            try {
                setStatus(`Groq (${attempt+1}/${MAX_RETRIES})`, 'online');
                const reply = await callGroq(messages);
                setStatus('Groq OK', 'online');
                return reply;
            } catch (err) {
                if (err.message === 'Rate limit') {
                    const wait = Math.min(1000 * Math.pow(2, attempt), 30000);
                    await new Promise(resolve => setTimeout(resolve, wait));
                }
            }
        }

        // 2. Hugging Face
        try {
            setStatus('Fallback HF', 'fallback');
            const reply = await callHuggingFace(messages);
            if (reply) { setStatus('HF OK', 'online'); return reply; }
        } catch (err) {}

        // 3. OpenRouter
        try {
            setStatus('Fallback OpenRouter', 'fallback');
            const reply = await callOpenRouter(messages);
            setStatus('OpenRouter OK', 'online');
            return reply;
        } catch (err) {}

        // 4. DeepSeek
        try {
            setStatus('Fallback DeepSeek', 'fallback');
            const reply = await callDeepSeek(messages);
            setStatus('DeepSeek OK', 'online');
            return reply;
        } catch (err) {}

        // 5. Base de connaissances (FAQ)
        const knowledgeReply = findKnowledgeAnswer(userQuestion);
        if (knowledgeReply) {
            setStatus('Réponse depuis la base de connaissances', 'knowledge');
            return `📚 ${knowledgeReply}`;
        }

        // 6. Dernier recours : message orienté client
        setStatus('Mode contact', 'error');
        return `Je suis désolé, tous les services sont saturés pour le moment. 
        
Pour toute question technique urgente, je vous invite à contacter directement Aymane Abidine :

📧 aymaneabidine@gmail.com  
📞 06 67 56 63 01

En attendant, je reste à votre disposition pour des échanges simples.`;
    }

    // ===================== GESTION DU FORMULAIRE =====================
    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = userInput.value.trim();
        if (!text || isProcessing) return;

        isProcessing = true;
        sendBtn.disabled = true;
        userInput.disabled = true;
        userInput.value = '';

        renderMessage('user', text);

        const waitDiv = document.createElement('div');
        waitDiv.className = 'message assistant loading-dots';
        waitDiv.textContent = 'Réflexion';
        messagesEl.appendChild(waitDiv);
        messagesEl.scrollTop = messagesEl.scrollHeight;

        try {
            const reply = await askAI(text);
            waitDiv.remove();
            renderMessage('assistant', reply);
        } catch (err) {
            waitDiv.remove();
            renderMessage('system-note', 'Erreur inattendue.');
        } finally {
            isProcessing = false;
            sendBtn.disabled = false;
            userInput.disabled = false;
            userInput.focus();
        }
    });

    // ===================== RESET =====================
    resetBtn.addEventListener('click', () => {
        if (confirm('Effacer toute la conversation ?')) {
            localStorage.removeItem('conversation_history');
            conversation = [{ role: 'system', content: systemPrompt() }];
            renderAllMessages();
            updateMemoryIndicator();
            setStatus('Réinitialisé', 'online');
        }
    });

    // ===================== INIT =====================
    window.onload = () => {
        loadConversation();
        if (conversation.length === 1) {
            const welcome = "Bonjour, je suis l'agent virtuel d'Ingénierie Travaux. Comment puis-je vous assister sur vos projets techniques aujourd'hui ?";
            renderMessage('assistant', welcome);
        }
        userInput.focus();
    };
</script>
</body>
</html>
