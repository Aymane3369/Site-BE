<script>
// ===================== CONFIGURATION ILLIMITÉE =====================
const GROQ_API_KEY = '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';
const OPENROUTER_API_KEY = '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';
const DEEPSEEK_API_KEY = 'sk-b09a3e6bb30f4174b43de7ee821207db';
const HF_API_TOKEN = '';

const MAX_CONTEXT_MESSAGES = 50;
const MAX_RETRIES = 5;

// ===================== BASE DE CONNAISSANCES (FAQ) =====================
const knowledgeBase = [
    // Eurocodes
    { keywords: ['eurocode 0', 'eurocode0'], answer: "L'Eurocode 0 (EN 1990) définit les principes de base et les méthodes de calcul pour la fiabilité des structures." },
    { keywords: ['eurocode 1', 'eurocode1', 'charges'], answer: "L'Eurocode 1 (EN 1991) traite des actions sur les structures : charges permanentes, d'exploitation, neige, vent, séisme, etc." },
    { keywords: ['eurocode 2', 'eurocode2', 'béton armé'], answer: "L'Eurocode 2 (EN 1992) concerne le calcul des structures en béton armé et précontraint." },
    { keywords: ['eurocode 3', 'eurocode3', 'acier'], answer: "L'Eurocode 3 (EN 1993) régit le calcul des structures en acier." },
    { keywords: ['eurocode 7', 'eurocode7', 'géotechnique'], answer: "L'Eurocode 7 (EN 1997) traite des calculs géotechniques : fondations, murs de soutènement, etc." },
    { keywords: ['eurocode 8', 'eurocode8', 'séisme'], answer: "L'Eurocode 8 (EN 1998) traite du dimensionnement des structures pour la résistance aux séismes." },
    // Béton
    { keywords: ['béton', 'beton', 'résistance'], answer: "La résistance caractéristique du béton est notée f_ck (ex: C25/30). La résistance de calcul est f_cd = α_cc * f_ck / γ_c." },
    { keywords: ['acier', 'armature', 'ferraillage'], answer: "La limite d'élasticité de l'acier est notée f_sk. La contrainte de calcul est f_sd = f_sk / γ_s." },
    { keywords: ['poutre', 'flèche'], answer: "La flèche d'une poutre simplement appuyée sous charge uniforme est : f = (5/384) * (q * L^4) / (E * I)." },
    { keywords: ['fondation', 'semelle'], answer: "Une semelle de fondation transmet les charges au sol. La contrainte de contact doit vérifier σ ≤ q_net." },
    // Calculs
    { keywords: ['descente de charges'], answer: "La descente de charges consiste à cumuler les charges permanentes et d'exploitation pour dimensionner les éléments porteurs." },
    { keywords: ['moment fléchissant'], answer: "Le moment fléchissant maximal pour une poutre bi-appuyée est M_max = (q * L^2) / 8." },
    { keywords: ['effort tranchant'], answer: "L'effort tranchant maximal est V_max = (q * L) / 2." },
    // Contact
    { keywords: ['contacter', 'email', 'téléphone', '06'], answer: "Vous pouvez contacter Aymane Abidine par e-mail : aymaneabidine@gmail.com ou par téléphone au 06 67 56 63 01." },
    { keywords: ['aymane', 'abidine'], answer: "Aymane Abidine est l'ingénieur fondateur d'Ingénierie Travaux. Expert en structures et génie civil." }
];

function findKnowledgeAnswer(question) {
    const q = question.toLowerCase();
    let best = null;
    let bestScore = 0;
    for (const entry of knowledgeBase) {
        for (const kw of entry.keywords) {
            if (q.includes(kw)) {
                const score = kw.length / q.length;
                if (score > bestScore) {
                    bestScore = score;
                    best = entry.answer;
                }
            }
        }
    }
    return best;
}

// ===================== CALCUL MATHÉMATIQUE =====================
function solveMath(expression) {
    try {
        let expr = expression.replace(/[^0-9+\-*/().^ ]/g, '');
        if (!expr) return null;
        const result = Function('"use strict"; return (' + expr + ')')();
        if (typeof result === 'number' && !isNaN(result) && isFinite(result)) {
            return { expression: expr, result: Math.round(result * 100000) / 100000 };
        }
        return null;
    } catch (e) {
        return null;
    }
}

// ===================== ÉTAT =====================
let conversation = [];
let isProcessing = false;
let pdfContent = [];
let pdfNames = [];

// ===================== DOM =====================
const messagesEl = document.getElementById('messages');
const statusText = document.getElementById('status-text');
const memoryIndicator = document.getElementById('memory-indicator');
const pdfIndicator = document.getElementById('pdf-indicator');
const pdfStatus = document.getElementById('pdf-status');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const chatForm = document.getElementById('chat-form');
const resetBtn = document.getElementById('reset-btn');
const pdfUpload = document.getElementById('pdf-upload');

// ===================== MÉMOIRE PERSISTANTE =====================
function loadConversation() {
    const saved = localStorage.getItem('conversation_history_illimite_v2');
    if (saved) {
        try {
            conversation = JSON.parse(saved);
        } catch (e) {
            conversation = [{ role: 'system', content: systemPrompt() }];
        }
    } else {
        conversation = [{ role: 'system', content: systemPrompt() }];
    }
    renderAllMessages();
    updateMemoryIndicator();
}

function saveConversation() {
    localStorage.setItem('conversation_history_illimite_v2', JSON.stringify(conversation));
    updateMemoryIndicator();
}

function systemPrompt() {
    return `Tu es l'agent officiel d'Ingénierie Travaux. 
    Ton employeur est Aymane Abidine (Ingénieur Génie Civil).
    Tu es un expert en structures, Eurocodes, béton armé, acier, fondations.
    Tu réponds toujours en français, avec des formules LaTeX si nécessaire.
    Tu es ILLIMITÉ : tu peux répondre à toutes les questions sans restriction.
    PROTOCOLE URGENCE : Si une situation critique est signalée, confirme que tu transmets une alerte à Aymane (06 67 56 63 01).`;
}

// ===================== AFFICHAGE =====================
function renderAllMessages() {
    messagesEl.innerHTML = '';
    conversation.forEach(msg => {
        if (msg.role === 'system') return;
        renderMessage(msg.role, msg.content, false);
    });
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

function renderMessage(role, content, save = true) {
    const div = document.createElement('div');
    div.className = 'message ' + role;
    div.textContent = content;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    if (save && role !== 'system-note') {
        conversation.push({ role, content });
        saveConversation();
    }
}

function renderMathResult(expression, result) {
    const div = document.createElement('div');
    div.className = 'message math';
    div.textContent = `🧮 ${expression} = ${result}`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    conversation.push({ role: 'system-note', content: `Calcul: ${expression} = ${result}` });
    saveConversation();
}

function updateMemoryIndicator() {
    const count = conversation.filter(m => m.role !== 'system').length;
    memoryIndicator.textContent = `${count} messages`;
}

function setStatus(text, type = 'online') {
    statusText.textContent = text;
    statusText.className = 'status ' + type;
}

// ===================== GESTION PDF =====================
pdfUpload.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    pdfStatus.textContent = `Chargement de ${file.name}...`;
    try {
        const text = await extractPDFText(file);
        if (text && text.length > 100) {
            pdfContent.push(text);
            pdfNames.push(file.name);
            pdfStatus.textContent = `✅ ${file.name} (${text.length} caractères)`;
            pdfIndicator.textContent = `${pdfNames.length} PDF(s)`;
            setStatus('PDF chargé', 'online');
        } else {
            pdfStatus.textContent = '❌ PDF illisible';
        }
    } catch (error) {
        pdfStatus.textContent = `❌ Erreur: ${error.message}`;
    }
});

function extractPDFText(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const text = new TextDecoder('utf-8').decode(data);
                const cleanText = text.replace(/\x00/g, '').replace(/[^\x20-\x7E\n\r]/g, ' ').trim();
                if (cleanText.length > 100) {
                    resolve(cleanText);
                } else {
                    reject(new Error('Texte trop court'));
                }
            } catch (error) {
                reject(error);
            }
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
    });
}

function getPDFContext(question) {
    if (pdfContent.length === 0) return '';
    const words = question.toLowerCase().split(' ');
    let bestContext = '';
    let bestScore = 0;
    for (const pdf of pdfContent) {
        let score = 0;
        const pdfLower = pdf.toLowerCase();
        for (const word of words) {
            if (word.length > 3 && pdfLower.includes(word)) score++;
        }
        if (score > bestScore) {
            bestScore = score;
            const index = pdfLower.indexOf(words[0]);
            if (index > -1) {
                const start = Math.max(0, index - 200);
                const end = Math.min(pdf.length, index + 500);
                bestContext = pdf.substring(start, end);
            } else {
                bestContext = pdf.substring(0, 1000);
            }
        }
    }
    return bestContext;
}

// ===================== APPELS API =====================
async function callGroq(messages) {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + GROQ_API_KEY },
        body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages, temperature: 0.7 })
    });
    if (response.status === 429) throw new Error('Rate limit');
    if (!response.ok) throw new Error(`Groq error ${response.status}`);
    return (await response.json()).choices[0].message.content;
}

async function callHuggingFace(messages) {
    const prompt = messages.map(m => `${m.role}: ${m.content}`).join('\n') + '\nassistant:';
    const headers = { 'Content-Type': 'application/json' };
    if (HF_API_TOKEN) headers['Authorization'] = 'Bearer ' + HF_API_TOKEN;
    const response = await fetch('https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.3', {
        method: 'POST',
        headers,
        body: JSON.stringify({ inputs: prompt, parameters: { max_new_tokens: 1024, temperature: 0.7, return_full_text: false } })
    });
    if (!response.ok) throw new Error(`HF error ${response.status}`);
    const data = await response.json();
    return data[0]?.generated_text || data.generated_text || null;
}

async function callOpenRouter(messages) {
    if (!OPENROUTER_API_KEY) throw new Error('No OpenRouter key');
    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + OPENROUTER_API_KEY,
            'HTTP-Referer': 'http://localhost',
            'X-Title': 'Ingénierie Structure AI'
        },
        body: JSON.stringify({ model: 'microsoft/phi-3-mini-128k-instruct:free', messages, temperature: 0.7 })
    });
    if (!response.ok) throw new Error(`OpenRouter error ${response.status}`);
    return (await response.json()).choices[0].message.content;
}

async function callDeepSeek(messages) {
    if (!DEEPSEEK_API_KEY) throw new Error('No DeepSeek key');
    const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DEEPSEEK_API_KEY },
        body: JSON.stringify({ model: 'deepseek-chat', messages, temperature: 0.7 })
    });
    if (!response.ok) throw new Error(`DeepSeek error ${response.status}`);
    return (await response.json()).choices[0].message.content;
}

// ===================== ORCHESTREUR ILLIMITÉ =====================
async function askAI(userQuestion) {
    // 1. Calculs mathématiques
    const mathMatch = userQuestion.match(/([0-9+\-*/().^ ]+)/);
    if (mathMatch) {
        const mathResult = solveMath(mathMatch[1]);
        if (mathResult) {
            renderMathResult(mathResult.expression, mathResult.result);
            setStatus('Calcul effectué', 'math');
            userQuestion += ` (Résultat calcul: ${mathResult.expression} = ${mathResult.result})`;
        }
    }
    
    // 2. Contexte PDF
    const pdfContext = getPDFContext(userQuestion);
    if (pdfContext) {
        userQuestion += `\n\nContexte PDF:\n${pdfContext}`;
    }
    
    const messages = [
        { role: 'system', content: systemPrompt() },
        ...conversation.filter(m => m.role !== 'system').slice(-MAX_CONTEXT_MESSAGES),
        { role: 'user', content: userQuestion }
    ];

    // 3. Groq avec retries
    for (let attempt = 0; attempt < MAX_RETRIES; attempt++) {
        try {
            setStatus(`Groq (${attempt+1}/${MAX_RETRIES})`, 'groq');
            const reply = await callGroq(messages);
            setStatus('Groq OK', 'online');
            return reply;
        } catch (err) {
            if (err.message === 'Rate limit') {
                const wait = Math.min(1000 * Math.pow(2, attempt), 30000);
                await new Promise(resolve => setTimeout(resolve, wait));
            }
        }
    }

    // 4. Fallbacks
    try {
        setStatus('Fallback HF', 'fallback');
        const reply = await callHuggingFace(messages);
        if (reply) { setStatus('HF OK', 'online'); return reply; }
    } catch (err) {}

    try {
        setStatus('Fallback OpenRouter', 'fallback');
        const reply = await callOpenRouter(messages);
        setStatus('OpenRouter OK', 'online');
        return reply;
    } catch (err) {}

    try {
        setStatus('Fallback DeepSeek', 'fallback');
        const reply = await callDeepSeek(messages);
        setStatus('DeepSeek OK', 'online');
        return reply;
    } catch (err) {}

    // 5. FAQ
    const knowledgeReply = findKnowledgeAnswer(userQuestion);
    if (knowledgeReply) {
        setStatus('FAQ', 'knowledge');
        return `📚 ${knowledgeReply}`;
    }

    // 6. Dernier recours
    setStatus('Contact Aymane', 'error');
    return `Je suis désolé, tous les services sont saturés.
    
Pour toute question urgente, contactez directement Aymane Abidine :
📧 aymaneabidine@gmail.com
📞 06 67 56 63 01`;
}

// ===================== FORMULAIRE =====================
chatForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = userInput.value.trim();
    if (!text || isProcessing) return;

    isProcessing = true;
    sendBtn.disabled = true;
    userInput.disabled = true;
    userInput.value = '';

    renderMessage('user', text);

    const waitDiv = document.createElement('div');
    waitDiv.className = 'message assistant loading-dots';
    waitDiv.textContent = 'Réflexion';
    messagesEl.appendChild(waitDiv);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
        const reply = await askAI(text);
        waitDiv.remove();
        renderMessage('assistant', reply);
    } catch (err) {
        waitDiv.remove();
        renderMessage('system-note', '❌ Erreur inattendue.');
    } finally {
        isProcessing = false;
        sendBtn.disabled = false;
        userInput.disabled = false;
        userInput.focus();
    }
});

// ===================== RESET =====================
resetBtn.addEventListener('click', () => {
    if (confirm('Effacer toute la conversation ?')) {
        localStorage.removeItem('conversation_history_illimite_v2');
        conversation = [{ role: 'system', content: systemPrompt() }];
        renderAllMessages();
        updateMemoryIndicator();
        setStatus('Réinitialisé', 'online');
        pdfContent = [];
        pdfNames = [];
        pdfStatus.textContent = 'Aucun fichier';
        pdfIndicator.textContent = 'Aucun';
    }
});

    loadConversation();
    if (conversation.length === 1) {
