<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingénierie Structure AI</title>
<style>
  body { font-family: sans-serif; background: #f4f7f6; margin: 0; display: flex; justify-content: center; height: 100vh; }
  .app { width: 100%; max-width: 700px; background: white; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
  header { background: #2c3e50; color: white; padding: 15px; text-align: center; }
  #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
  .message { padding: 10px; border-radius: 8px; max-width: 80%; }
  .user { align-self: flex-end; background: #3498db; color: white; }
  .assistant { align-self: flex-start; background: #ecf0f1; }
  #admin-panel { display: none; background: #fff3cd; padding: 10px; border-bottom: 2px solid #ffc107; }
  form { padding: 15px; border-top: 1px solid #ddd; display: flex; gap: 5px; }
  textarea { flex: 1; padding: 8px; }
</style>
</head>
<body>

<div class="app">
  <header><h1>Ingénierie Structure AI</h1></header>
  
  <div id="admin-panel">
    <strong>[MODE ADMIN]</strong>
    <button onclick="afficherConversationComplete()">Revoir Tout</button>
    <button onclick="downloadHistory()">Exporter</button>
    <button onclick="resetData()" style="color:red;">Vider Tout</button>
  </div>

  <div id="messages"></div>

  <form id="chat-form">
    <textarea id="user-input" placeholder="Votre question..." required></textarea>
    <button type="submit">Envoyer</button>
  </form>
</div>

<script>
  const GROQ_API_KEY = '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';
  let conversation = JSON.parse(localStorage.getItem('chat_data')) || [{ role: 'system', content: 'Tu es l assistant d Ingénierie Structure. Expert en génie civil.' }];

  // --- LOGIQUE ADMIN DIRECTE ---
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('mode') === 'admin') {
    const code = prompt("Code Admin :");
    if (code === 'ton_code_secret') { // CHANGE TON MOT DE PASSE ICI
      document.getElementById('admin-panel').style.display = 'block';
    } else {
      alert("Accès refusé");
    }
  }

  function renderUI(role, text) {
    const div = document.createElement('div');
    div.className = 'message ' + role;
    div.textContent = text;
    document.getElementById('messages').appendChild(div);
  }

  conversation.forEach(msg => { if(msg.role !== 'system') renderUI(msg.role, msg.content); });

  document.getElementById('chat-form').onsubmit = async (e) => {
    e.preventDefault();
    const input = document.getElementById('user-input');
    renderUI('user', input.value);
    conversation.push({ role: 'user', content: input.value });
    
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {'Authorization': 'Bearer '+GROQ_API_KEY, 'Content-Type': 'application/json'},
      body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages: conversation })
    });
    const data = await res.json();
    const reply = data.choices[0].message.content;
    
    renderUI('assistant', reply);
    conversation.push({ role: 'assistant', content: reply });
    localStorage.setItem('chat_data', JSON.stringify(conversation));
    input.value = '';
  };

  function afficherConversationComplete() {
    const w = window.open("", "_blank");
    w.document.write("<pre>" + JSON.stringify(conversation, null, 2) + "</pre>");
  }
  function downloadHistory() {
    const blob = new Blob([JSON.stringify(conversation)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'historique.json'; a.click();
  }
  function resetData() { localStorage.removeItem('chat_data'); location.reload(); }
</script>
</body>
</html>
