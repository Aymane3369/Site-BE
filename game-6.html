<!DOCTYPE html>
<html>
    <head>
        <title>Page Title</title>
    </head><!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingénierie Structure AI like ChatGPT</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: Arial, Helvetica, sans-serif;
    background-color: #f0f2f5;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .app {
    width: 100%;
    max-width: 700px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background-color: #ffffff;
  }

  header {
    background-color: #2c3e50;
    color: white;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  header h1 {
    font-size: 18px;
  }

  header button {
    background-color: #e74c3c;
    border: none;
    color: white;
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
  }

  .config {
    padding: 10px 16px;
    background-color: #ecf0f1;
    border-bottom: 1px solid #ddd;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .config input[type="password"] {
    flex: 1;
    min-width: 150px;
    padding: 6px 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 13px;
  }

  .config select {
    padding: 6px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 13px;
  }

  .config button {
    padding: 6px 10px;
    background-color: #2980b9;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
  }

  .config-status {
    font-size: 12px;
    color: pink;
    font-weight: bold;
    width: 100%;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .message {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 10px;
    line-height: 1.4;
    font-size: 14px;
    white-space: pre-wrap;
  }

  .message.user {
    align-self: flex-end;
    background-color: #2980b9;
    color: white;
  }

  .message.assistant {
    align-self: flex-start;
    background-color: #e8eaed;
    color: #222;
  }

  .message.system-note {
    align-self: center;
    background-color: transparent;
    color: #999;
    font-size: 12px;
  }

  .typing {
    align-self: flex-start;
    color: #888;
    font-size: 13px;
    font-style: italic;
    padding: 0 14px;
  }

  form#chat-form {
    display: flex;
    padding: 12px;
    border-top: 1px solid #ddd;
    gap: 8px;
  }

  #user-input {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
    resize: none;
  }

  #send-btn {
    padding: 10px 18px;
    background-color: #27ae60;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }

  #send-btn:disabled {
    background-color: #95a5a6;
    cursor: not-allowed;
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>Ingénierie Structure AI Like ChatGPT</h1>
    <button id="reset-btn">Clear Conversation</button>
  </header>

  <div class="config">
    <select id="model-select">
      <option value="llama-3.3-70b-versatile">Ingénierie Structure AI V3</option>
      <option value="llama-3.1-8b-instant">Ingénierie Structure AI V2</option>
      <option value="gemma2-9b-it">Ingénierie Structure AI V1</option>
    </select>
    <div class="config-status" id="config-status">Online • Made with love by Ingénierie Structure ♥ </div>
  </div>

  <div id="messages"></div>

  <form id="chat-form">
    <textarea id="user-input" rows="1" placeholder="Write here" required></textarea>
    <button id="send-btn" type="submit">Send</button>
  </form>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const formEl = document.getElementById('chat-form');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const modelSelectEl = document.getElementById('model-select');
  const resetBtn = document.getElementById('reset-btn');
  const statusEl = document.getElementById('config-status');

  const GROQ_API_KEY = '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';

  let conversation = [
    { role: 'system', content: 'You are a helpfull assistant your owner is Ingénierie Structure ❤️' }
  ];

  const MAX_HISTORY = 20; 
  
  function renderMessage(role, content) {
    const div = document.createElement('div');
    div.className = 'message ' + role;
    div.textContent = content;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function renderNote(text) {
    const div = document.createElement('div');
    div.className = 'message system-note';
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function callGroq(apiKey, model) {
    const historyToSend = conversation.slice(-MAX_HISTORY);

    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify({
        model: model,
        messages: historyToSend,
        temperature: 0.7
      })
    });

    if (!response.ok) {
      const errText = await response.text();
      throw new Error('Error API (' + response.status + '): ' + errText);
    }

    const data = await response.json();
    return data.choices[0].message.content;
  }

  formEl.addEventListener('submit', async (e) => {
    e.preventDefault();

    const model = modelSelectEl.value;
    const userText = inputEl.value.trim();

    if (!userText) return;

    renderMessage('user', userText);
    conversation.push({ role: 'user', content: userText });
    inputEl.value = '';

    sendBtn.disabled = true;
    sendBtn.textContent = '...';
    const typingEl = document.createElement('div');
    typingEl.className = 'typing';
    typingEl.textContent = 'Thinking...';
    messagesEl.appendChild(typingEl);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
      const reply = await callGroq(GROQ_API_KEY, model);
      typingEl.remove();
      renderMessage('assistant', reply);
      conversation.push({ role: 'assistant', content: reply });
    } catch (err) {
      typingEl.remove();
      renderNote('Error : ' + err.message);
      console.error(err);
    } finally{
      sendBtn.disabled = false;
      sendBtn.textContent = 'Send';
      inputEl.focus();
    }
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      formEl.requestSubmit();
    }
  });

  resetBtn.addEventListener('click', () => {
    conversation = [
      { role: 'system', content: 'You are a helpfull assistant. your owner is Ingénierie Structure ❤️' }
    ];
    messagesEl.innerHTML = '';
    renderNote('Context cleared.');
  });
</script>

</body>
</html>
