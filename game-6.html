<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingénierie Structure AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; height: 100vh; display: flex; flex-direction: column; align-items: center; }
  .app { width: 100%; max-width: 700px; height: 100vh; display: flex; flex-direction: column; background-color: #ffffff; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
  header { background-color: #2c3e50; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
  .config { padding: 10px 16px; background-color: #ecf0f1; border-bottom: 1px solid #ddd; font-size: 12px; color: #7f8c8d; }
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .message { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
  .message.user { align-self: flex-end; background-color: #2980b9; color: white; }
  .message.assistant { align-self: flex-start; background-color: #e8eaed; color: #222; }
  .message.system-note { align-self: center; color: #999; font-size: 11px; font-style: italic; }
  #chat-form { display: flex; padding: 12px; border-top: 1px solid #ddd; gap: 8px; }
  #user-input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
  #send-btn { padding: 10px 20px; background-color: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; }
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>Ingénierie Structure AI</h1>
    <button id="reset-btn" style="background:#e74c3c; color:white; border:none; padding:5px 10px; cursor:pointer;">Reset</button>
  </header>
  <div class="config">Statut : Système opérationnel • Agent Ingénierie Travaux</div>
  <div id="messages"></div>
  <form id="chat-form">
    <textarea id="user-input" rows="1" placeholder="Posez votre question technique..." required></textarea>
    <button id="send-btn" type="submit">Envoyer</button>
  </form>
</div>

<script>
  const GROQ_API_KEY = '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';
  
  let conversation = [{ 
    role: 'system', 
    content: `Tu es l'agent officiel d'Ingénierie Travaux (ingenierie-travaux.vercel.app). 
    Ton employeur est Aymane Abidine (Ingénieur Génie Civil).
    Tes missions :
    1. Assister Aymane Abidine dans ses études (Eurocodes, EXE, suivi de chantier).
    2. Accueillir les clients avec professionnalisme, clarté et pédagogie.
    3. PROTOCOLE D'URGENCE : Si une situation critique est signalée, tu dois confirmer que tu transmets une alerte prioritaire à Aymane Abidine (06 67 56 63 01 / aymaneabidine@gmail.com) et donner les consignes de sécurité immédiates.
    4. Tu as accès aux données d'Aymane (Lyon/Villeurbanne, expertise béton, Robot Structural Analysis, AutoCAD).`
  }];

  const messagesEl = document.getElementById('messages');
  
  function renderMessage(role, content) {
    const div = document.createElement('div');
    div.className = 'message ' + role;
    div.textContent = content;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // Accueil client
  window.onload = () => {
    const welcome = "Bonjour, je suis l'agent virtuel d'Ingénierie Travaux. Comment puis-je vous assister sur vos projets techniques aujourd'hui ?";
    renderMessage('assistant', welcome);
    conversation.push({ role: 'assistant', content: welcome });
  };

  document.getElementById('chat-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;

    renderMessage('user', text);
    conversation.push({ role: 'user', content: text });
    input.value = '';

    try {
      const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + GROQ_API_KEY },
        body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages: conversation })
      });
      const data = await response.json();
      const reply = data.choices[0].message.content;
      renderMessage('assistant', reply);
      conversation.push({ role: 'assistant', content: reply });
    } catch (err) {
      renderMessage('system-note', 'Erreur de connexion.');
    }
  });

  document.getElementById('reset-btn').onclick = () => { location.reload(); };
</script>

</body>
</html>
