<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StyleShop</title>

<script src="https://js.stripe.com/v3/"></script>

<style>
/* ================= BASE ================= */
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f8fafc;color:#0f172a}

/* HEADER */
.header{
    background:white;
    border-bottom:1px solid #e2e8f0;
    padding:1rem 2rem;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    z-index:100;
}

.cart-icon{position:relative;cursor:pointer;font-size:1.5rem}
.cart-count{
    position:absolute;
    top:-8px;
    right:-10px;
    background:#3b82f6;
    color:white;
    font-size:0.7rem;
    padding:2px 6px;
    border-radius:20px;
}

/* CONTAINER */
.container{max-width:1200px;margin:auto;padding:2rem}

.products-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:1.5rem;
}

/* CARD */
.product-card{
    background:white;
    border-radius:18px;
    padding:1rem;
    border:1px solid #e2e8f0;
    cursor:pointer;
    transition:.2s;
}
.product-card:hover{transform:translateY(-3px)}

.product-icon img{
    width:60px;height:60px;
    object-fit:cover;
    border-radius:8px;
}

button{
    border:none;
    padding:.5rem .8rem;
    border-radius:20px;
    cursor:pointer;
}
.primary{background:#3b82f6;color:white}
.outline{background:white;border:1px solid #cbd5e1}

/* ================= DRAWER ================= */
.cart-drawer{
    position:fixed;
    top:0;
    right:-380px;
    width:360px;
    height:100%;
    background:white;
    box-shadow:-10px 0 30px rgba(0,0,0,0.1);
    transition:.3s;
    z-index:2000;
    display:flex;
    flex-direction:column;
}
.cart-drawer.open{right:0}

.cart-header{
    display:flex;
    justify-content:space-between;
    padding:1rem;
    border-bottom:1px solid #e2e8f0;
}

.cart-footer{
    margin-top:auto;
    padding:1rem;
    border-top:1px solid #e2e8f0;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    padding:.8rem;
    border-bottom:1px solid #eee;
}

/* ANIMATION */
.flying{
    position:fixed;
    width:18px;
    height:18px;
    background:#3b82f6;
    border-radius:50%;
    z-index:9999;
    transition:all .6s ease;
}
</style>
</head>

<body>

<div class="header">
    <div><strong>StyleShop</strong></div>

    <div class="cart-icon" onclick="toggleCartDrawer()">
        🛒
        <span id="cartCount" class="cart-count">0</span>
    </div>
</div>

<!-- DRAWER -->
<div id="cartDrawer" class="cart-drawer">
    <div class="cart-header">
        <h3>Panier</h3>
        <button onclick="toggleCartDrawer()">✕</button>
    </div>

    <div id="cartContent"></div>

    <div class="cart-footer">
        <button class="primary" style="width:100%">
            Paiement
        </button>
    </div>
</div>

<!-- CONTENT -->
<div class="container">
    <h1>Catalogue</h1>
    <div id="products" class="products-grid"></div>
</div>

<script>

/* ================= SUPABASE ================= */
const SUPABASE_URL = 'https://xrocqhazpmjcnqjdyytd.supabase.co';
const SUPABASE_KEY = 'YOUR_KEY';

/* ================= STATE ================= */
let products = [];
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

/* ================= LOAD ================= */
async function loadProducts(){
    const res = await fetch(`${SUPABASE_URL}/rest/v1/products?select=*`, {
        headers:{
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`
        }
    });

    products = await res.json() || [];
    render();
}

/* ================= RENDER ================= */
function render(){
    const el = document.getElementById("products");

    el.innerHTML = products.map(p=>`
        <div class="product-card">

            <div class="product-icon">
                ${p.image_url ? `<img src="${p.image_url}">` : "📦"}
            </div>

            <h3>${p.name}</h3>
            <p>${(p.price || 0).toFixed(2)} €</p>

            <!-- AJOUT RAPIDE -->
            <div style="display:flex;gap:6px;margin-top:10px"
                 onclick="event.stopPropagation()">

                <button class="outline"
                    onclick="quickAdd('${p.id}', -1, event)">-</button>

                <button class="primary"
                    onclick="quickAdd('${p.id}', 1, event)">
                    🛒 Ajouter
                </button>

                <button class="outline"
                    onclick="quickAdd('${p.id}', 1, event)">+</button>

            </div>

        </div>
    `).join('');
}

/* ================= QUICK ADD ================= */
function quickAdd(id, qty, e){
    const p = products.find(x=>String(x.id)===String(id));
    if(!p) return;

    let item = cart.find(c=>String(c.id)===String(id));

    if(!item){
        cart.push({...p, qty: Math.max(1, qty)});
    } else {
        item.qty += qty;
    }

    if(item && item.qty <= 0){
        cart = cart.filter(c=>String(c.id)!==String(id));
    }

    saveCart();
    updateCart();
    renderCart();
    animate(e);
}

/* ================= CART ================= */
function toggleCartDrawer(){
    document.getElementById("cartDrawer").classList.toggle("open");
    renderCart();
}

function renderCart(){
    const el = document.getElementById("cartContent");

    if(cart.length === 0){
        el.innerHTML = "Panier vide";
        return;
    }

    el.innerHTML = cart.map((i,idx)=>`
        <div class="cart-item">
            <div>${i.name}</div>

            <div>
                <button onclick="changeQty(${idx},-1)">-</button>
                ${i.qty}
                <button onclick="changeQty(${idx},1)">+</button>
            </div>
        </div>
    `).join('');
}

function changeQty(i,d){
    cart[i].qty += d;

    if(cart[i].qty <= 0){
        cart.splice(i,1);
    }

    saveCart();
    updateCart();
    renderCart();
}

/* ================= STORAGE ================= */
function saveCart(){
    localStorage.setItem("cart", JSON.stringify(cart));
}

function updateCart(){
    document.getElementById("cartCount").innerText =
        cart.reduce((s,i)=>s + i.qty, 0);
}

/* ================= ANIMATION FIX ================= */
function animate(e){
    if(!e) return;

    const dot = document.createElement("div");
    dot.className = "flying";
    document.body.appendChild(dot);

    const rect = e.target.getBoundingClientRect();
    dot.style.left = rect.left + "px";
    dot.style.top = rect.top + "px";

    const cartIcon = document.querySelector(".cart-icon").getBoundingClientRect();

    setTimeout(()=>{
        dot.style.left = cartIcon.left + "px";
        dot.style.top = cartIcon.top + "px";
        dot.style.opacity = "0";
    }, 50);

    setTimeout(()=>dot.remove(), 600);
}

/* ================= INIT ================= */
loadProducts();
updateCart();

</script>

</body>
</html>
