<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StyleShop</title>

<script src="https://js.stripe.com/v3/"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f8fafc;color:#0f172a}

/* HEADER */
.header{
    display:flex;justify-content:space-between;align-items:center;
    padding:1rem 2rem;background:white;border-bottom:1px solid #e2e8f0;
    position:sticky;top:0;z-index:100
}

.cart-icon{cursor:pointer;position:relative}
.cart-count{
    position:absolute;top:-8px;right:-10px;
    background:#3b82f6;color:white;border-radius:20px;
    font-size:0.7rem;padding:2px 6px
}

/* CONTAINER */
.container{max-width:1200px;margin:auto;padding:2rem}

.products-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:1.5rem
}

/* CARD */
.product-card{
    background:white;padding:1rem;border-radius:18px;
    border:1px solid #e2e8f0;
    transition:.2s;
}
.product-card:hover{transform:translateY(-3px)}

button{
    border:none;padding:.5rem .8rem;border-radius:20px;
    cursor:pointer
}
.primary{background:#3b82f6;color:white}
.outline{background:white;border:1px solid #cbd5e1}

/* DRAWER */
.cart-drawer{
    position:fixed;top:0;right:-400px;
    width:360px;height:100%;
    background:white;
    box-shadow:-10px 0 30px rgba(0,0,0,0.1);
    transition:.3s;
    z-index:1000;
    display:flex;flex-direction:column
}
.cart-drawer.open{right:0}

.cart-header{
    display:flex;justify-content:space-between;
    padding:1rem;border-bottom:1px solid #e2e8f0
}

.cart-footer{
    margin-top:auto;
    padding:1rem;
    border-top:1px solid #e2e8f0
}

.cart-item{
    display:flex;justify-content:space-between;
    padding:.7rem;border-bottom:1px solid #eee
}

/* ANIMATION */
.flying{
    position:fixed;
    width:18px;height:18px;
    background:#3b82f6;
    border-radius:50%;
    z-index:9999;
    transition:all .6s ease;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div><strong>StyleShop</strong></div>

    <div class="cart-icon" onclick="toggleCart()">
        🛒
        <span id="cartCount" class="cart-count">0</span>
    </div>
</div>

<!-- DRAWER -->
<div id="drawer" class="cart-drawer">
    <div class="cart-header">
        <h3>Panier</h3>
        <button onclick="toggleCart()">✕</button>
    </div>

    <div id="cartContent" style="padding:1rem"></div>

    <div class="cart-footer">
        <button class="primary" style="width:100%">
            Paiement
        </button>
    </div>
</div>

<!-- CONTENT -->
<div class="container">
    <h1>Catalogue</h1>
    <div id="products" class="products-grid"></div>
</div>

<script>

/* ================= DATA ================= */
let products = [
    {id:1,name:"T-shirt",price:19.99},
    {id:2,name:"Casquette",price:14.99},
    {id:3,name:"Sneakers",price:59.99}
];

let cart = [];

/* ================= RENDER ================= */
function render(){
    const el = document.getElementById("products");

    el.innerHTML = products.map(p=>`
        <div class="product-card">

            <h3>${p.name}</h3>
            <p>${p.price.toFixed(2)} €</p>

            <!-- ACTIONS RAPIDES -->
            <div style="display:flex;gap:6px;margin-top:10px"
                 onclick="event.stopPropagation()">

                <button class="outline"
                    onclick="quickAdd(${p.id},-1,event)">-</button>

                <button class="primary"
                    onclick="quickAdd(${p.id},1,event)">
                    🛒 Ajouter
                </button>

                <button class="outline"
                    onclick="quickAdd(${p.id},1,event)">+</button>

            </div>

        </div>
    `).join('');
}

/* ================= QUICK ADD ================= */
function quickAdd(id,qty,e){
    const p = products.find(x=>x.id===id);
    if(!p) return;

    let item = cart.find(c=>c.id===id);

    if(!item){
        cart.push({...p,qty});
    } else {
        item.qty += qty;
    }

    if(item && item.qty<=0){
        cart = cart.filter(c=>c.id!==id);
    }

    updateCart();
    renderCart();
    animate(e);
}

/* ================= CART ================= */
function toggleCart(){
    document.getElementById("drawer").classList.toggle("open");
    renderCart();
}

function renderCart(){
    const el = document.getElementById("cartContent");

    if(cart.length===0){
        el.innerHTML="Panier vide";
        return;
    }

    el.innerHTML = cart.map((i,idx)=>`
        <div class="cart-item">
            <div>${i.name}</div>

            <div>
                <button onclick="changeQty(${idx},-1)">-</button>
                ${i.qty}
                <button onclick="changeQty(${idx},1)">+</button>
            </div>
        </div>
    `).join('');
}

function changeQty(i,d){
    cart[i].qty += d;
    if(cart[i].qty<=0) cart.splice(i,1);
    updateCart();
    renderCart();
}

/* ================= CART COUNT ================= */
function updateCart(){
    document.getElementById("cartCount").innerText =
        cart.reduce((s,i)=>s+i.qty,0);
}

/* ================= ANIMATION ================= */
function animate(e){
    if(!e) return;

    const dot=document.createElement("div");
    dot.className="flying";
    document.body.appendChild(dot);

    const rect=e.target.getBoundingClientRect();
    dot.style.left=rect.left+"px";
    dot.style.top=rect.top+"px";

    const cart=document.querySelector(".cart-icon").getBoundingClientRect();

    setTimeout(()=>{
        dot.style.left=cart.left+"px";
        dot.style.top=cart.top+"px";
        dot.style.opacity="0";
    },50);

    setTimeout(()=>dot.remove(),600);
}

/* ================= INIT ================= */
render();
updateCart();

</script>

</body>
</html>
