<style>
:root{
  --bg:#060913;
  --panel:rgba(255,255,255,0.03);
  --stroke:rgba(255,255,255,0.08);
  --text:#eaf0ff;
  --muted:#9aa6c0;
  --gold:#d6b25e;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: "Montserrat", sans-serif;
}

body{
  background: radial-gradient(circle at top, #0c1224, var(--bg));
  color:var(--text);
  overflow-x:hidden;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  z-index:1000;
  backdrop-filter: blur(16px);
  background:rgba(6,9,19,0.7);
  border-bottom:1px solid var(--stroke);
}

.header-wrap{
  max-width:1200px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 25px;
}

.logo{
  font-weight:700;
  letter-spacing:3px;
}
.logo span{color:var(--gold)}

nav ul{
  display:flex;
  gap:22px;
  list-style:none;
}

nav a{
  color:var(--muted);
  text-decoration:none;
  font-size:13px;
  letter-spacing:1px;
  transition:0.3s;
}

nav a:hover{
  color:var(--gold);
}

/* HERO PREMIUM ARCHITECTURE */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(to bottom, rgba(6,9,19,0.6), rgba(6,9,19,0.95)),
    url("https://images.unsplash.com/photo-1503387762-592deb58ef4e") center/cover;
  filter:contrast(1.1);
}

.hero-content{
  position:relative;
  max-width:900px;
  padding:20px;
}

.hero h1{
  font-size:56px;
  letter-spacing:2px;
  font-weight:700;
}

.hero h1 span{
  color:var(--gold);
}

.hero p{
  margin-top:20px;
  color:var(--muted);
  font-size:17px;
  line-height:1.7;
  max-width:650px;
  margin-left:auto;
  margin-right:auto;
}

.cta{
  display:inline-block;
  margin-top:30px;
  padding:14px 32px;
  background:linear-gradient(135deg,var(--gold),#ffdf8a);
  color:#111;
  font-weight:700;
  border-radius:8px;
  text-decoration:none;
  transition:0.3s;
}

.cta:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(214,178,94,0.2);
}

/* SECTIONS */
section{
  max-width:1200px;
  margin:120px auto;
  padding:0 25px;
}

.section-title{
  font-size:14px;
  letter-spacing:3px;
  color:var(--gold);
  margin-bottom:35px;
}

/* GRID ULTRA CLEAN */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:22px;
}

/* CARDS LUXE */
.card{
  background:var(--panel);
  border:1px solid var(--stroke);
  padding:26px;
  border-radius:14px;
  transition:0.4s;
  position:relative;
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,transparent,rgba(214,178,94,0.05));
  opacity:0;
  transition:0.4s;
}

.card:hover{
  transform:translateY(-8px);
  border-color:rgba(214,178,94,0.4);
}

.card:hover::before{
  opacity:1;
}

.card h3{
  font-size:16px;
  margin-bottom:10px;
}

.card p{
  color:var(--muted);
  font-size:14px;
  line-height:1.6;
}

/* STATS PREMIUM */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.stat{
  padding:22px;
  border:1px solid var(--stroke);
  background:rgba(255,255,255,0.02);
  text-align:center;
  border-radius:12px;
}

.stat h2{
  font-size:28px;
  color:var(--gold);
}

/* METHOD CLEAN */
.step{
  padding:16px;
  margin-bottom:12px;
  border-left:3px solid var(--gold);
  background:var(--panel);
  border-radius:10px;
  color:var(--muted);
}

/* CONTACT */
form{
  display:grid;
  gap:14px;
  max-width:600px;
}

input,textarea{
  padding:14px;
  border-radius:10px;
  border:1px solid var(--stroke);
  background:rgba(0,0,0,0.2);
  color:white;
}

button{
  padding:14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,var(--gold),#ffdf8a);
  font-weight:700;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:translateY(-2px);
}

/* ANIMATION */
.fade{
  opacity:0;
  transform:translateY(30px);
  transition:0.9s ease;
}

.fade.show{
  opacity:1;
  transform:translateY(0);
}

/* FOOTER */
footer{
  text-align:center;
  padding:60px;
  border-top:1px solid var(--stroke);
  color:var(--muted);
  margin-top:120px;
}
</style>
