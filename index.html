<title>BET STRUCTURE | Ingénierie & Calcul de Structures</title>

<style>

/* =========================
   NEW BLUE TECH DESIGN
========================= */

:root{
  --bg:#070b18;
  --panel:rgba(255,255,255,0.05);
  --panel2:rgba(255,255,255,0.09);
  --stroke:rgba(255,255,255,0.12);
  --text:#e6f0ff;
  --muted:#9bb0d1;

  --gold:#4da3ff;
  --gold2:#7cc4ff;

  --shadow: 0 20px 40px rgba(0,0,0,0.5);
  --radius: 16px;
}

/* LIGHT MODE */
body.light{
  --bg:#f3f7ff;
  --panel:rgba(0,0,0,0.04);
  --panel2:rgba(0,0,0,0.08);
  --stroke:rgba(0,0,0,0.12);
  --text:#0f172a;
  --muted:#475569;

  --gold:#2563eb;
  --gold2:#60a5fa;

  --shadow: 0 20px 40px rgba(0,0,0,0.10);
}

/* GLOBAL */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat', sans-serif;
}

body{
  background: radial-gradient(circle at 20% 20%, #0e1a3a, var(--bg));
  color:var(--text);
  overflow-x:hidden;
}

/* PARTICLES */
#particles-canvas{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  opacity:0.35;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  z-index:1000;
  backdrop-filter: blur(18px);
  background: rgba(7,11,24,0.7);
  border-bottom:1px solid var(--stroke);
  padding:16px 40px;
}

.logo{
  font-weight:800;
  letter-spacing:3px;
  font-size:20px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* NAV */
nav a{
  color:var(--muted);
  text-decoration:none;
  font-size:13px;
  transition:0.3s;
}

nav a:hover{
  color:var(--gold);
}

/* HERO */
.hero{
  min-height:90vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero h1{
  font-size:3.5rem;
}

.hero h1 span{
  background: linear-gradient(135deg,var(--gold),var(--gold2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* CTA */
.cta{
  display:inline-block;
  margin-top:30px;
  padding:14px 36px;
  border-radius:60px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#0b1220;
  font-weight:700;
}

/* CARDS */
.card{
  background:var(--panel);
  border:1px solid var(--stroke);
  border-radius:var(--radius);
  padding:24px;
  transition:0.4s;
}

.card:hover{
  transform:translateY(-8px);
  border-color:var(--gold);
  background:var(--panel2);
}

/* STATS */
.stat h2{
  color:var(--gold);
}

/* SECTION TITLE */
.section-title{
  color:var(--gold);
}

/* INPUT */
input,textarea{
  background:rgba(255,255,255,0.04);
  border:1px solid var(--stroke);
  color:var(--text);
}

/* BUTTON */
button{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:none;
  color:#0b1220;
}

/* FOOTER */
footer{
  text-align:center;
  padding:40px;
  color:var(--muted);
}

/* SCROLLBAR */
::-webkit-scrollbar-thumb{
  background:var(--gold);
}

</style>
</head>

<body>

<canvas id="particles-canvas"></canvas>

<header>
  <div class="logo">BET INGENIERIE STRUCTURE</div>
</header>

<section class="hero">
  <div>
    <h1>Ingénierie <span>Structurelle</span></h1>
    <p>Calcul et optimisation selon Eurocodes</p>
    <a class="cta" href="#contact">Demander une étude</a>
  </div>
</section>

<footer>
  BET STRUCTURE — Ingénierie & Calcul
</footer>

</body>
</html>
