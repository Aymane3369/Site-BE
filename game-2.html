<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Luxury Rolex Watch</title> <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet"> <style> *{ margin:0; padding:0; box-sizing:border-box; } body{ background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%); display:flex; justify-content:center; align-items:center; min-height:100vh; overflow:hidden; font-family:Arial,sans-serif; } .watch-container{ position:relative; animation:watch-float 6s ease-in-out infinite; } @keyframes watch-float{ 0%,100%{ transform:translateY(0) rotateX(5deg) rotateY(-5deg); } 50%{ transform:translateY(-10px) rotateX(5deg) rotateY(5deg); } } /* Straps */ .watch-strap{ position:absolute; width:clamp(70px,20vw,100px); height:200px; background:linear-gradient( 90deg, #2C1810 0%, #8B4513 20%, #A0522D 50%, #8B4513 80%, #2C1810 100% ); left:50%; transform:translateX(-50%); border-radius:10px; box-shadow: inset 0 0 20px rgba(0,0,0,.5), 0 10px 30px rgba(0,0,0,.8); z-index:1; } .strap-top{ top:-180px; } .strap-bottom{ bottom:-180px; } .strap-top::after, .strap-bottom::after{ content:''; position:absolute; width:100%; height:100%; background:repeating-linear-gradient( 0deg, transparent 0px, rgba(0,0,0,.2) 2px, transparent 4px ); } /* Watch */ .watch{ position:relative; width:clamp(220px,70vw,280px); height:clamp(220px,70vw,280px); z-index:10; } .watch-bezel{ position:absolute; inset:0; border-radius:50%; background:conic-gradient( from 0deg, #C0C0C0 0deg, #E8E8E8 60deg, #A8A8A8 120deg, #D3D3D3 180deg, #B8B8B8 240deg, #E0E0E0 300deg, #C0C0C0 360deg ); box-shadow: 0 0 0 8px #FFD700, 0 20px 60px rgba(0,0,0,.8), inset 0 0 30px rgba(255,255,255,.3), inset 0 -10px 20px rgba(0,0,0,.4); } .watch-bezel::before{ content:''; position:absolute; inset:12px; border-radius:50%; background:#0a0a0a; box-shadow:inset 0 5px 15px rgba(0,0,0,.8); } .watch-face{ position:absolute; inset:20px; border-radius:50%; background:radial-gradient(circle at 30% 30%,#1a1a1a 0%,#000 70%); box-shadow: inset 0 0 40px rgba(0,0,0,.9), inset 0 0 80px rgba(0,100,200,.1); } /* Markers */ .markers span{ position:absolute; width:4px; height:20px; background:linear-gradient(180deg,#FFD700,#FFA500); top:10px; left:50%; transform-origin:50% 110px; transform: translateX(-50%) rotate(calc(var(--i) * 30deg)); border-radius:2px; box-shadow:0 0 10px rgba(255,215,0,.5); } .markers span:nth-child(3), .markers span:nth-child(6), .markers span:nth-child(9), .markers span:nth-child(12){ width:6px; height:25px; background:linear-gradient(180deg,#fff,#C0C0C0); } /* Brand */ .brand{ position:absolute; top:30%; left:50%; transform:translateX(-50%); font-family:'Playfair Display',serif; font-size:.9rem; color:#FFD700; letter-spacing:3px; text-shadow:0 0 10px rgba(255,215,0,.5); } /* Date */ .date-window{ position:absolute; top:50%; right:20%; transform:translateY(-50%); width:35px; height:25px; background:#fff; border:2px solid #FFD700; border-radius:3px; display:grid; place-items:center; } .date-num{ color:#000; font-weight:bold; } /* Hands */ .hand{ position:absolute; bottom:50%; left:50%; transform-origin:50% 100%; border-radius:10px; } .hour-hand{ width:6px; height:60px; background:linear-gradient(180deg,#FFD700,#FFA500); z-index:3; } .minute-hand{ width:4px; height:85px; background:linear-gradient(180deg,#E8E8E8,#C0C0C0); z-index:4; } .second-hand{ width:2px; height:95px; background:red; z-index:5; box-shadow:0 0 10px rgba(255,0,0,.8); } .second-hand::before{ content:''; position:absolute; width:8px; height:8px; border-radius:50%; background:red; bottom:-4px; left:50%; transform:translateX(-50%); } .center-dot{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:14px; height:14px; border-radius:50%; background:radial-gradient(circle,#FFD700,#FFA500); z-index:6; } .glass-reflection{ position:absolute; inset:0; border-radius:50%; background:linear-gradient( 135deg, rgba(255,255,255,.4) 0%, transparent 50% ); pointer-events:none; z-index:7; } /* YouTube Button */ .yt-btn{ position:fixed; right:20px; bottom:20px; padding:12px 20px; border-radius:50px; text-decoration:none; color:#fff; font-weight:bold; background:linear-gradient(45deg,#ff0000,#ff4d4d); box-shadow:0 0 20px rgba(255,0,0,.5); transition:.3s; z-index:999; } .yt-btn:hover{ transform:translateY(-3px) scale(1.05); } /* Mobile */ @media(max-width:768px){ .watch-container{ transform:scale(.9); } .brand{ font-size:.75rem; } .hour-hand{ height:50px; } .minute-hand{ height:70px; } .second-hand{ height:80px; } } @media(max-width:480px){ .watch-container{ transform:scale(.75); } .strap-top, .strap-bottom{ height:150px; } .yt-btn{ width:55px; height:55px; display:flex; align-items:center; justify-content:center; border-radius:50%; padding:0; font-size:22px; } } </style> </head> <body> <div class="watch-container"> <div class="watch-strap strap-top"></div> <div class="watch"> <div class="watch-bezel"></div> <div class="watch-face"> <div class="markers"> <span style="--i:1"></span> <span style="--i:2"></span> <span style="--i:3"></span> <span style="--i:4"></span> <span style="--i:5"></span> <span style="--i:6"></span> <span style="--i:7"></span> <span style="--i:8"></span> <span style="--i:9"></span> <span style="--i:10"></span> <span style="--i:11"></span> <span style="--i:12"></span> </div> <div class="brand">ROLEX</div> <div class="date-window"> <div class="date-num" id="date"></div> </div> <div class="hand hour-hand" id="hour"></div> <div class="hand minute-hand" id="minute"></div> <div class="hand second-hand" id="second"></div> <div class="center-dot"></div> <div class="glass-reflection"></div> </div> </div> <div class="watch-strap strap-bottom"></div> </div> <a href="https://youtube.com/@cssmagiclab" target="_blank" class="yt-btn"> ▶ </a> <script> function updateClock(){ const now = new Date(); const seconds = now.getSeconds(); const minutes = now.getMinutes(); const hours = now.getHours() % 12; const date = now.getDate(); const secondDeg = (seconds / 60) * 360; const minuteDeg = (minutes / 60) * 360 + (seconds / 60) * 6; const hourDeg = (hours / 12) * 360 + (minutes / 60) * 30; document.getElementById('second').style.transform = `translateX(-50%) rotate(${secondDeg}deg)`; document.getElementById('minute').style.transform = `translateX(-50%) rotate(${minuteDeg}deg)`; document.getElementById('hour').style.transform = `translateX(-50%) rotate(${hourDeg}deg)`; document.getElementById('date').textContent = date; } updateClock(); setInterval(updateClock,1000); </script> </body> </html> >
