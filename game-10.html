<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculus Pro — Moteur CAS Avancé</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        :root {
            --bg: #0f172a; --container: #1e293b; --text: #f1f5f9; --border: #334155;
            --hover: #475569; --primary: #818cf8; --primary-hover: #6366f1;
            --code-bg: #0b0f19; --step-bg: #1e293b; --var-color: #f87171; --success: #34d399;
        }
        body { background: var(--bg); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px; color: var(--text); }
        .container { background: var(--container); width: 100%; max-width: 1100px; padding: 30px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        h1 { font-size: 26px; font-weight: 700; background: linear-gradient(135deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; text-align: center; }
        .calc-section { padding: 24px; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid var(--border); }
        .calc-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-top: 15px; }
        @media (max-width: 600px) { .calc-grid { grid-template-columns: 1fr; } }
        input, select, button { padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border); background: #0f172a; color: var(--text); font-size: 16px; width: 100%; }
        input { font-family: 'Courier New', monospace; font-size: 18px; grid-column: 1 / -1; }
        .mode-tabs { grid-column: 1 / -1; display: flex; gap: 8px; }
        .mode-tabs button { cursor: pointer; flex: 1; font-weight: 600; background: #0f172a; transition: 0.2s; border: 1px solid var(--border); }
        .mode-tabs button.active { background: var(--primary); color: white; border-color: var(--primary); }
        .actions-row { grid-column: 1 / -1; display: flex; gap: 10px; }
        .actions-row button { flex: 1; cursor: pointer; font-weight: 600; }
        .calc-result { grid-column: 1 / -1; padding: 24px; background: var(--code-bg); border-radius: 12px; border: 1px solid var(--border); font-family: 'Times New Roman', serif; line-height: 2.2; margin-top: 15px; overflow-x: auto; }
        .formula { font-size: 24px; font-weight: 700; color: var(--primary); margin-bottom: 12px; padding: 10px; background: rgba(129, 140, 248, 0.1); border-left: 5px solid var(--primary); border-radius: 4px; display: flex; align-items: center; flex-wrap: wrap; }
        .step { font-size: 17px; margin: 6px 0; padding: 6px 12px; background: rgba(255,255,255,0.02); border-left: 3px solid var(--border); }
        .step-number { font-weight: 700; color: var(--primary); }
        .var-highlight { color: var(--var-color); font-weight: 700; font-style: italic; }
        .verification { color: var(--success); font-weight: 600; padding: 8px 12px; background: rgba(52, 211, 153, 0.1); border-radius: 6px; margin-top: 15px; border-left: 4px solid var(--success); font-family: sans-serif; font-size: 15px; }
        
        /* Styles d'affichage des fractions verticales et racines */
        .frac { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; margin: 0 6px; line-height: 1.1; padding: 3px 0; }
        .frac .num { border-bottom: 1px solid currentColor; padding: 0 6px; padding-bottom: 3px; text-align: center; }
        .frac .den { padding: 0 6px; padding-top: 3px; text-align: center; }
        .sqrt { border-top: 1px solid currentColor; padding: 0 3px; margin-left: 1px; vertical-align: middle; }
        .sqrt-symbol { font-size: 1.1em; vertical-align: middle; margin-right: -2px; }
        
        .calc-examples { grid-column: 1 / -1; display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; align-items: center; }
        .calc-examples button { padding: 6px 12px; font-size: 13px; cursor: pointer; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 6px; flex: 0 1 auto; width: auto; }
        .calc-examples button:hover { background: var(--hover); }
        .tables-section { margin-top: 40px; padding-top: 24px; border-top: 2px solid var(--border); }
        .tables-section h2 { font-size: 22px; margin-bottom: 16px; }
        .table-container { overflow-x: auto; margin-bottom: 24px; border-radius: 12px; border: 1px solid var(--border); }
        .table-container table { width: 100%; border-collapse: collapse; font-size: 15px; }
        .table-container th { background: var(--primary); color: white; padding: 12px 16px; text-align: left; font-weight: 600; }
        .table-container td { padding: 10px 16px; border-bottom: 1px solid var(--border); font-family: 'Times New Roman', serif; font-size: 17px; vertical-align: middle; }
        .table-container tr:nth-child(even) { background: rgba(255,255,255,0.03); }
        .table-toggle { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
        .table-toggle button { padding: 8px 20px; border-radius: 20px; border: 2px solid var(--border); background: transparent; color: var(--text); font-weight: 600; cursor: pointer; transition: 0.2s; width: auto; }
        .table-toggle button.active { border-color: var(--primary); background: var(--primary); color: white; }
        .hide-table { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧮 Calculus Engine — Système de Calcul Formel (CAS)</h1>
        <div class="calc-section">
            <div class="calc-grid">
                <input type="text" id="calcInput" value="2*x*cos(x^2)">
                <select id="calcVariable">
                    <option value="x" selected>Variable : x</option>
                    <option value="y">Variable : y</option>
                    <option value="z">Variable : z</option>
                    <option value="t">Variable : t</option>
                    <option value="a">Variable : a</option>
                    <option value="b">Variable : b</option>
                    <option value="c">Variable : c</option>
                </select>
                <input type="hidden" id="calcOperation" value="integral">
                <div class="mode-tabs">
                    <button data-mode="derivative">📈 Dérivation d/d[var]</button>
                    <button class="active" data-mode="integral">∫ Intégration Formelle</button>
                </div>
                <div class="actions-row">
                    <button id="calcBtn" style="background: var(--primary); color: white;">➜ Exécuter l'Analyse</button>
                    <button id="calcClearBtn">Effacer</button>
                </div>
                <div id="calcResult" class="calc-result"></div>
                <div class="calc-examples">
                    <strong style="font-size:14px;">Tests requis :</strong>
                    <button data-expr="1/x^2" data-op="derivative">d/dx(1/x²)</button>
                    <button data-expr="1/x^2" data-op="integral">∫1/x² dx</button>
                    <button data-expr="sin(x^2)" data-op="derivative">d/dx(sin(x²))</button>
                    <button data-expr="2*x*cos(x^2)" data-op="integral">∫2x·cos(x²) dx</button>
                    <button data-expr="ln(x)" data-op="integral">∫ln(x) dx</button>
                    <button data-expr="x*exp(x)" data-op="integral">∫x·e^x dx</button>
                    <button data-expr="arctan(x)" data-op="derivative">d/dx(arctan(x))</button>
                    <button data-expr="1/(1+x^2)" data-op="integral">∫1/(1+x²) dx</button>
                    <button data-expr="x^2 + y^9 + z^5" data-v="y" data-op="derivative">d/dy(x²+y⁹+z⁵)</button>
                    <button data-expr="x^2 + y^9 + z^5" data-v="y" data-op="integral">∫(x²+y⁹+z⁵) dy</button>
                </div>
            </div>
        </div>

        <div class="tables-section">
            <h2>📊 Tableaux de Référence Formelle</h2>
            <div class="table-toggle">
                <button class="active" data-table="derivatives">Dérivées</button>
                <button data-table="integrals">Primitives</button>
                <button data-table="all">Tout afficher</button>
            </div>
            <div id="derivativesTable" class="table-container">
                <table>
                    <thead><tr><th>Fonction f(x)</th><th>Dérivée f'(x)</th><th>Domaine / Conditions</th></tr></thead>
                    <tbody id="derivativesTableBody"></tbody>
                </table>
            </div>
            <div id="integralsTable" class="table-container hide-table">
                <table>
                    <thead><tr><th>Fonction f(x)</th><th>Primitive ∫ f(x) dx</th><th>Domaine / Conditions</th></tr></thead>
                    <tbody id="integralsTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  STRUCTURE DE L'AST (Arbre de Syntaxe Abstraite)
        // ============================================================
        class Node {
            constructor(type, value = null, left = null, right = null) {
                this.type = type;   
                this.value = value;
                this.left = left;
                this.right = right;
            }
        }

        // ============================================================
        //  TOKENIZER & PARSER
        // ============================================================
        function tokenize(expr) {
            const tokens = [];
            let i = 0;
            while (i < expr.length) {
                const c = expr[i];
                if (c === ' ') { i++; continue; }
                if ('()+-*/^,'.includes(c)) {
                    tokens.push({ type: 'op', value: c });
                    i++;
                    continue;
                }
                if (/[a-zA-Z]/.test(c)) {
                    let name = '';
                    while (i < expr.length && /[a-zA-Z0-9]/.test(expr[i])) {
                        name += expr[i];
                        i++;
                    }
                    if (name === 'e') tokens.push({ type: 'const', value: 'e' });
                    else tokens.push({ type: 'ident', value: name });
                    continue;
                }
                if (/[0-9.]/.test(c)) {
                    let num = '';
                    while (i < expr.length && /[0-9.]/.test(expr[i])) {
                        num += expr[i];
                        i++;
                    }
                    tokens.push({ type: 'number', value: parseFloat(num) });
                    continue;
                }
                i++;
            }
            return tokens;
        }

        class Parser {
            constructor(tokens) { this.tokens = tokens; this.pos = 0; }
            peek() { return this.tokens[this.pos] || null; }
            next() { return this.tokens[this.pos++] || null; }
            parse() { return this.parseExpr(); }
            parseExpr() {
                let node = this.parseTerm();
                while (this.peek() && (this.peek().value === '+' || this.peek().value === '-')) {
                    const op = this.next().value;
                    node = new Node(op === '+' ? 'add' : 'sub', null, node, this.parseTerm());
                }
                return node;
            }
            parseTerm() {
                let node = this.parsePower();
                while (this.peek() && (this.peek().value === '*' || this.peek().value === '/')) {
                    const op = this.next().value;
                    node = new Node(op === '*' ? 'mul' : 'div', null, node, this.parsePower());
                }
                return node;
            }
            parsePower() {
                let node = this.parseFactor();
                while (this.peek() && this.peek().value === '^') {
                    this.next();
                    node = new Node('pow', null, node, this.parseFactor());
                }
                return node;
            }
            parseFactor() {
                const tok = this.peek();
                if (!tok) return new Node('number', 0);
                if (tok.type === 'number') { this.next(); return new Node('number', tok.value); }
                if (tok.type === 'const') { this.next(); return new Node('const', 'e'); }
                if (tok.type === 'ident') {
                    const name = tok.value;
                    this.next();
                    if (this.peek() && this.peek().value === '(') {
                        this.next();
                        const args = [];
                        if (this.peek() && this.peek().value !== ')') {
                            args.push(this.parseExpr());
                            while (this.peek() && this.peek().value === ',') {
                                this.next();
                                args.push(this.parseExpr());
                            }
                        }
                        if (this.peek() && this.peek().value === ')') this.next();
                        if (name === 'sqrt') {
                            return new Node('pow', null, args[0], new Node('number', 0.5));
                        }
                        return new Node('func', name, null, args);
                    }
                    return new Node('var', name);
                }
                if (tok.value === '(') {
                    this.next();
                    const node = this.parseExpr();
                    if (this.peek() && this.peek().value === ')') this.next();
                    return node;
                }
                if (tok.value === '-') {
                    this.next();
                    return new Node('neg', null, this.parseFactor());
                }
                return new Node('number', 0);
            }
        }

        // ============================================================
        //  SIMPLIFICATEUR FORMEL DE COUPLAGE (Algorithme Aplatisseur)
        // ============================================================
        function simplifyNode(node) {
            if (!node) return node;
            
            if (node.type === 'add' || node.type === 'sub' || node.type === 'mul' || node.type === 'div' || node.type === 'pow') {
                node.left = simplifyNode(node.left);
                node.right = simplifyNode(node.right);
            } else if (node.type === 'neg') {
                node.left = simplifyNode(node.left);
            } else if (node.type === 'func' && node.right) {
                node.right = node.right.map(simplifyNode);
            }

            if (node.type === 'add' && node.left.type === 'number' && node.right.type === 'number')
                return new Node('number', node.left.value + node.right.value);
            if (node.type === 'sub' && node.left.type === 'number' && node.right.type === 'number')
                return new Node('number', node.left.value - node.right.value);
            if (node.type === 'mul' && node.left.type === 'number' && node.right.type === 'number')
                return new Node('number', node.left.value * node.right.value);
            if (node.type === 'div' && node.left.type === 'number' && node.right.type === 'number' && node.right.value !== 0) {
                const v = node.left.value / node.right.value;
                if (Number.isInteger(v)) return new Node('number', v);
                const g = gcd(Math.abs(node.left.value), Math.abs(node.right.value));
                if (g > 1) {
                    return new Node('div', null, new Node('number', node.left.value / g), new Node('number', node.right.value / g));
                }
            }

            if (node.type === 'add') {
                if (node.left.type === 'number' && node.left.value === 0) return node.right;
                if (node.right.type === 'number' && node.right.value === 0) return node.left;
                if (toRawText(node.left) === toRawText(node.right)) {
                    return new Node('mul', null, new Node('number', 2), node.left);
                }
            }
            if (node.type === 'sub') {
                if (node.right.type === 'number' && node.right.value === 0) return node.left;
                if (node.left.type === 'number' && node.left.value === 0) return new Node('neg', null, node.right);
                if (toRawText(node.left) === toRawText(node.right)) return new Node('number', 0);
            }
            if (node.type === 'mul') {
                if (node.left.type === 'number' && node.left.value === 0) return new Node('number', 0);
                if (node.right.type === 'number' && node.right.value === 0) return new Node('number', 0);
                if (node.left.type === 'number' && node.left.value === 1) return node.right;
                if (node.right.type === 'number' && node.right.value === 1) return node.left;
                
                // Consolidation récursive globale des fractions et facteurs numériques
                if (node.left.type === 'mul' && node.left.left.type === 'number' && node.right.type === 'number') {
                    return new Node('mul', null, new Node('number', node.left.left.value * node.right.value), node.left.right);
                }
                if (node.left.type === 'number' && node.right.type === 'mul' && node.right.left.type === 'number') {
                    return new Node('mul', null, new Node('number', node.left.value * node.right.left.value), node.right.right);
                }
            }
            if (node.type === 'div') {
                if (node.left.type === 'number' && node.left.value === 0) return new Node('number', 0);
                if (node.right.type === 'number' && node.right.value === 1) return node.left;
                if (toRawText(node.left) === toRawText(node.right)) return new Node('number', 1);

                // Correction majeure de l'arbre imbriqué (ex: (6*z^5*6)/36)
                if (node.left.type === 'mul' && node.left.left.type === 'number' && node.right.type === 'number') {
                    const g = gcd(Math.abs(node.left.left.value), Math.abs(node.right.value));
                    const numCoef = node.left.left.value / g;
                    const denCoef = node.right.value / g;
                    if (denCoef === 1) {
                        if (numCoef === 1) return node.left.right;
                        return new Node('mul', null, new Node('number', numCoef), node.left.right);
                    } else {
                        return new Node('div', null, new Node('mul', null, new Node('number', numCoef), node.left.right), new Node('number', denCoef));
                    }
                }
                if (node.left.type === 'mul' && node.left.left.type === 'mul' && node.left.left.left.type === 'number' && node.right.type === 'number') {
                    const dynamicCoef = node.left.left.left.value * (node.left.right.type === 'number' ? node.left.right.value : 1);
                    if (dynamicCoef === node.right.value) return node.left.left.right;
                }
            }
            if (node.type === 'pow') {
                if (node.right.type === 'number' && node.right.value === 0) return new Node('number', 1);
                if (node.right.type === 'number' && node.right.value === 1) return node.left;
                if (node.right.type === 'number' && node.right.value < 0) {
                    const posExp = new Node('number', -node.right.value);
                    return new Node('div', null, new Node('number', 1), new Node('pow', null, node.left, posExp));
                }
            }
            if (node.type === 'neg' && node.left.type === 'neg') return node.left.left;

            return node;
        }

        // ============================================================
        //  MOTEUR DE DÉRIVATION DYNAMIQUE
        // ============================================================
        function derivative(node, varName) {
            if (!node) return new Node('number', 0);
            switch (node.type) {
                case 'number': case 'const': return new Node('number', 0);
                case 'var': return node.value === varName ? new Node('number', 1) : new Node('number', 0);
                case 'neg': return new Node('neg', null, derivative(node.left, varName));
                case 'add': return new Node('add', null, derivative(node.left, varName), derivative(node.right, varName));
                case 'sub': return new Node('sub', null, derivative(node.left, varName), derivative(node.right, varName));
                case 'mul': {
                    return new Node('add', null,
                        new Node('mul', null, derivative(node.left, varName), node.right),
                        new Node('mul', null, node.left, derivative(node.right, varName))
                    );
                }
                case 'div': {
                    const num = new Node('sub', null,
                        new Node('mul', null, derivative(node.left, varName), node.right),
                        new Node('mul', null, node.left, derivative(node.right, varName))
                    );
                    return new Node('div', null, num, new Node('pow', null, node.right, new Node('number', 2)));
                }
                case 'pow': {
                    const u = node.left;
                    const n = node.right;
                    if (n.type === 'number') {
                        return new Node('mul', null,
                            n,
                            new Node('mul', null, derivative(u, varName), new Node('pow', null, u, new Node('number', n.value - 1)))
                        );
                    }
                    return new Node('number', 0);
                }
                case 'func': {
                    const u = node.right[0];
                    const du = derivative(u, varName);
                    switch (node.value) {
                        case 'ln': return new Node('div', null, du, u);
                        case 'exp': return new Node('mul', null, du, node);
                        case 'sin': return new Node('mul', null, du, new Node('func', 'cos', null, [u]));
                        case 'cos': return new Node('mul', null, new Node('neg', null, du), new Node('func', 'sin', null, [u]));
                        case 'tan': return new Node('div', null, du, new Node('pow', null, new Node('func', 'cos', null, [u]), new Node('number', 2)));
                        case 'cot': return new Node('neg', null, new Node('div', null, du, new Node('pow', null, new Node('func', 'sin', null, [u]), new Node('number', 2))));
                        case 'sec': return new Node('mul', null, du, new Node('mul', null, new Node('func', 'sec', null, [u]), new Node('func', 'tan', null, [u])));
                        case 'csc': return new Node('neg', null, new Node('mul', null, du, new Node('mul', null, new Node('func', 'csc', null, [u]), new Node('func', 'cot', null, [u]))));
                        case 'sinh': return new Node('mul', null, du, new Node('func', 'cosh', null, [u]));
                        case 'cosh': return new Node('mul', null, du, new Node('func', 'sinh', null, [u]));
                        case 'tanh': return new Node('div', null, du, new Node('pow', null, new Node('func', 'cosh', null, [u]), new Node('number', 2)));
                        case 'arcsin': return new Node('div', null, du, new Node('pow', null, new Node('sub', null, new Node('number', 1), new Node('pow', null, u, new Node('number', 2))), new Node('number', 0.5)));
                        case 'arccos': return new Node('neg', null, new Node('div', null, du, new Node('pow', null, new Node('sub', null, new Node('number', 1), new Node('pow', null, u, new Node('number', 2))), new Node('number', 0.5))));
                        case 'arctan': return new Node('div', null, du, new Node('add', null, new Node('number', 1), new Node('pow', null, u, new Node('number', 2))));
                        default: return new Node('number', 0);
                    }
                }
                default: return new Node('number', 0);
            }
        }

        // ============================================================
        //  MOTEUR D'INTÉGRATION STRUCTURÉE
        // ============================================================
        function containsVariable(node, varName) {
            if (!node) return false;
            if (node.type === 'var' && node.value === varName) return true;
            if (node.type === 'func' && node.right) return node.right.some(arg => containsVariable(arg, varName));
            return containsVariable(node.left, varName) || containsVariable(node.right, varName);
        }

        function integrate(node, varName) {
            if (!node) return new Node('number', 0);
            if (!containsVariable(node, varName)) return new Node('mul', null, node, new Node('var', varName));

            switch (node.type) {
                case 'var':
                    if (node.value === varName) {
                        return new Node('div', null, new Node('pow', null, node, new Node('number', 2)), new Node('number', 2));
                    }
                    return new Node('mul', null, node, new Node('var', varName));
                
                case 'add': return new Node('add', null, integrate(node.left, varName), integrate(node.right, varName));
                case 'sub': return new Node('sub', null, integrate(node.left, varName), integrate(node.right, varName));
                
                case 'mul': {
                    let l = node.left;
                    let r = node.right;
                    if (!containsVariable(l, varName)) return new Node('mul', null, l, integrate(r, varName));
                    if (!containsVariable(r, varName)) return new Node('mul', null, r, integrate(l, varName));

                    let targetFunc = r.type === 'func' ? r : (l.type === 'func' ? l : null);
                    let targetDeriv = r.type === 'func' ? l : (l.type === 'func' ? r : null);
                    
                    if (targetFunc && targetFunc.right) {
                        let u = targetFunc.right[0];
                        let du = simplifyNode(derivative(u, varName));
                        if (toRawText(simplifyNode(targetDeriv)) === toRawText(du)) {
                            switch (targetFunc.value) {
                                case 'cos': return new Node('func', 'sin', null, [u]);
                                case 'sin': return new Node('neg', null, new Node('func', 'cos', null, [u]));
                                case 'exp': return targetFunc;
                                case 'sinh': return new Node('func', 'cosh', null, [u]);
                                case 'cosh': return new Node('func', 'sinh', null, [u]);
                            }
                        }
                    }

                    if (l.type === 'var' && l.value === varName && r.type === 'func' && r.value === 'exp' && r.right[0].type === 'var' && r.right[0].value === varName) {
                        return new Node('mul', null, r, new Node('sub', null, l, new Node('number', 1)));
                    }
                    return new Node('mul', null, node, new Node('var', varName));
                }
                
                case 'div': {
                    let num = node.left;
                    let den = node.right;
                    if (!containsVariable(den, varName)) return new Node('div', null, integrate(num, varName), den);
                    
                    let dDen = simplifyNode(derivative(den, varName));
                    if (toRawText(simplifyNode(num)) === toRawText(dDen)) {
                        return new Node('func', 'ln', null, [den]);
                    }
                    
                    if (den.type === 'add' && den.left.type === 'number' && den.left.value === 1 && den.right.type === 'pow') {
                        let u = den.right.left;
                        let dU = simplifyNode(derivative(u, varName));
                        if (toRawText(simplifyNode(num)) === toRawText(dU) && den.right.right.type === 'number' && den.right.right.value === 2) {
                            return new Node('func', 'arctan', null, [u]);
                        }
                    }
                    return new Node('mul', null, node, new Node('var', varName));
                }
                
                case 'pow': {
                    if (node.left.type === 'var' && node.left.value === varName && node.right.type === 'number') {
                        let val = node.right.value;
                        if (val === -1) return new Node('func', 'ln', null, [node.left]);
                        return new Node('div', null, new Node('pow', null, node.left, new Node('number', val + 1)), new Node('number', val + 1));
                    }
                    return new Node('mul', null, node, new Node('var', varName));
                }
                
                case 'func': {
                    let u = node.right[0];
                    if (u.type === 'var' && u.value === varName) {
                        switch (node.value) {
                            case 'ln': return new Node('sub', null, new Node('mul', null, u, node), u);
                            case 'exp': return node;
                            case 'sin': return new Node('neg', null, new Node('func', 'cos', null, [u]));
                            case 'cos': return new Node('func', 'sin', null, [u]);
                            case 'tan': return new Node('neg', null, new Node('func', 'ln', null, [new Node('func', 'cos', null, [u])]));
                            case 'cot': return new Node('func', 'ln', null, [new Node('func', 'sin', null, [u])]);
                            case 'sec': return new Node('func', 'ln', null, [new Node('add', null, new Node('func', 'sec', null, [u]), new Node('func', 'tan', null, [u]))]);
                            case 'csc': return new Node('neg', null, new Node('func', 'ln', null, [new Node('add', null, new Node('func', 'csc', null, [u]), new Node('func', 'cot', null, [u]))]));
                            case 'sinh': return new Node('func', 'cosh', null, [u]);
                            case 'cosh': return new Node('func', 'sinh', null, [u]);
                        }
                    }
                    return new Node('mul', null, node, new Node('var', varName));
                }
                default: return new Node('mul', null, node, new Node('var', varName));
            }
        }

        // ============================================================
        //  ÉVALUATION NUMÉRIQUE STABLE
        // ============================================================
        function evaluateNumerical(node, vars) {
            if (!node) return 0;
            switch (node.type) {
                case 'number': return node.value;
                case 'var': return vars[node.value] !== undefined ? vars[node.value] : 1.5;
                case 'const': return Math.E;
                case 'neg': return -evaluateNumerical(node.left, vars);
                case 'add': return evaluateNumerical(node.left, vars) + evaluateNumerical(node.right, vars);
                case 'sub': return evaluateNumerical(node.left, vars) - evaluateNumerical(node.right, vars);
                case 'mul': return evaluateNumerical(node.left, vars) * evaluateNumerical(node.right, vars);
                case 'div': {
                    let d = evaluateNumerical(node.right, vars);
                    return d === 0 ? 0 : evaluateNumerical(node.left, vars) / d;
                }
                case 'pow': return Math.pow(evaluateNumerical(node.left, vars), evaluateNumerical(node.right, vars));
                case 'func': {
                    let val = evaluateNumerical(node.right[0], vars);
                    switch (node.value) {
                        case 'ln': return Math.log(Math.abs(val || 1));
                        case 'exp': return Math.exp(val);
                        case 'sin': return Math.sin(val);
                        case 'cos': return Math.cos(val);
                        case 'tan': return Math.tan(val);
                        case 'cot': return 1 / Math.tan(val);
                        case 'sec': return 1 / Math.cos(val);
                        case 'csc': return 1 / Math.sin(val);
                        case 'sinh': return Math.sinh(val);
                        case 'cosh': return Math.cosh(val);
                        case 'tanh': return Math.tanh(val);
                        case 'arcsin': return Math.asin(Math.max(-1, Math.min(1, val)));
                        case 'arccos': return Math.acos(Math.max(-1, Math.min(1, val)));
                        case 'arctan': return Math.atan(val);
                        default: return 0;
                    }
                }
                default: return 0;
            }
        }

        function verifyResult(originalAst, finalResultAst, varName, op) {
            const pt = { x: 1.25, y: 1.25, z: 1.25, t: 1.25, a: 1.25, b: 1.25, c: 1.25 };
            const h = 0.00001;
            const ptP = { ...pt }, ptM = { ...pt };
            ptP[varName] += h;
            ptM[varName] -= h;
            
            try {
                if (op === 'derivative') {
                    let numD = (evaluateNumerical(originalAst, ptP) - evaluateNumerical(originalAst, ptM)) / (2 * h);
                    let anaD = evaluateNumerical(finalResultAst, pt);
                    if (isNaN(numD) || isNaN(anaD)) return '';
                    if (Math.abs(numD - anaD) < 0.05) {
                        return `<div class="verification">✅ Validation numérique : f'(${pt[varName]}) ≈ ${anaD.toFixed(4)} (Tolérance ok)</div>`;
                    }
                    return `<div class="verification" style="color:#f87171; background:rgba(248,113,113,0.1); border-color:#f87171;">⚠️ Écart numérique d/d${varName} détecté (Vérifier le domaine de convergence)</div>`;
                } else {
                    let numD = (evaluateNumerical(finalResultAst, ptP) - evaluateNumerical(finalResultAst, ptM)) / (2 * h);
                    let orig = evaluateNumerical(originalAst, pt);
                    if (isNaN(numD) || isNaN(orig)) return '';
                    if (Math.abs(numD - orig) < 0.05) {
                        return `<div class="verification">✅ Validation par Théorème Fondamental : d/d${varName}(F) == f(${varName}) (Tolérance ok)</div>`;
                    }
                    return `<div class="verification" style="color:#f87171; background:rgba(248,113,113,0.1); border-color:#f87171;">⚠️ Écart numérique détecté sur la primitive</div>`;
                }
            } catch(e) { return ''; }
        }

        // ============================================================
        //  MOTEUR DE RENDU ET FORMALISATION HTML
        // ============================================================
        function toRawText(node) {
            if (!node) return '';
            switch (node.type) {
                case 'number': return String(node.value);
                case 'var': case 'const': return node.value;
                case 'neg': return `-${toRawText(node.left)}`;
                case 'add': return `${toRawText(node.left)}+${toRawText(node.right)}`;
                case 'sub': return `${toRawText(node.left)}-${toRawText(node.right)}`;
                case 'mul': return `${toRawText(node.left)}*${toRawText(node.right)}`;
                case 'div': return `${toRawText(node.left)}/${toRawText(node.right)}`;
                case 'pow': return `${toRawText(node.left)}^${toRawText(node.right)}`;
                case 'func': return `${node.value}(${node.right.map(toRawText).join(',')})`;
                default: return '';
            }
        }

        function toHTML(node, varName) {
            if (!node) return '';
            switch (node.type) {
                case 'number': return String(Number(node.value.toFixed(4)));
                case 'var': 
                    return node.value === varName ? `<span class="var-highlight">${node.value}</span>` : `<span>${node.value}</span>`;
                case 'const': return node.value === 'e' ? 'e' : node.value;
                case 'neg': return `−${toHTML(node.left, varName)}`;
                case 'add': return `${toHTML(node.left, varName)} + ${toHTML(node.right, varName)}`;
                case 'sub': return `${toHTML(node.left, varName)} − ${toHTML(node.right, varName)}`;
                case 'mul': {
                    let l = toHTML(node.left, varName);
                    let r = toHTML(node.right, varName);
                    if (node.left.type === 'number' && node.left.value === 1) return r;
                    if (node.right.type === 'number' && node.right.value === 1) return l;
                    return `${l}·${r}`;
                }
                case 'div': return `<span class="frac"><span class="num">${toHTML(node.left, varName)}</span><span class="den">${toHTML(node.right, varName)}</span></span>`;
                case 'pow': {
                    if (node.right.type === 'number' && node.right.value === 0.5) {
                        return `<span class="sqrt-symbol">√</span><span class="sqrt">${toHTML(node.left, varName)}</span>`;
                    }
                    if (node.right.type === 'number' && node.right.value < 0) {
                        let positivePow = new Node('pow', null, node.left, new Node('number', Math.abs(node.right.value)));
                        return `<span class="frac"><span class="num">1</span><span class="den">${toHTML(positivePow, varName)}</span></span>`;
                    }
                    let base = toHTML(node.left, varName);
                    if (['add', 'sub', 'mul', 'div'].includes(node.left.type)) base = `(${base})`;
                    return `${base}<sup>${toHTML(node.right, varName)}</sup>`;
                }
                case 'func': return `<span style="color:var(--primary); font-weight:bold;">${node.value}</span>(${node.right.map(a => toHTML(a, varName)).join(', ')})`;
                default: return '?';
            }
        }

        function collectTerms(node, sign = 1) {
            if (!node) return [];
            if (node.type === 'add') return [...collectTerms(node.left, sign), ...collectTerms(node.right, sign)];
            if (node.type === 'sub') return [...collectTerms(node.left, sign), ...collectTerms(node.right, -sign)];
            return [{ node: node, sign: sign }];
        }

        // ============================================================
        //  FONCTION PRINCIPALE DE PILOTAGE
        // ============================================================
        function compute() {
            const expr = document.getElementById('calcInput').value.trim();
            const varName = document.getElementById('calcVariable').value;
            const op = document.getElementById('calcOperation').value;
            const resultDiv = document.getElementById('calcResult');

            if (!expr) return;
            try {
                let cleaned = expr.replace(/²/g, '^2').replace(/³/g, '^3').replace(/⁴/g, '^4').replace(/⁵/g, '^5');
                const tokens = tokenize(cleaned);
                const parser = new Parser(tokens);
                let ast = simplifyNode(parser.parse());
                let resultHTML = '';

                if (op === 'derivative') {
                    let finalResult = simplifyNode(derivative(ast, varName));
                    resultHTML = `<div class="formula"><span class="frac"><span class="num">d</span><span class="den">d${varName}</span></span> (${toHTML(ast, varName)}) = ${toHTML(finalResult, varName)}</div>`;
                    
                    let terms = collectTerms(ast);
                    if (terms.length > 1) {
                        resultHTML += `<div style="margin-top:10px; font-weight:600;">Analyse pas à pas des composants :</div>`;
                        terms.forEach((t, idx) => {
                            let prefix = t.sign === -1 ? '− ' : '';
                            let dTerm = simplifyNode(derivative(t.node, varName));
                            resultHTML += `<div class="step"><span class="step-number">[Terme ${idx+1}]</span> d/d${varName}(${prefix}${toHTML(t.node, varName)}) ➜ ${toHTML(dTerm, varName)}</div>`;
                        });
                    }
                    resultHTML += verifyResult(ast, finalResult, varName, op);
                } else {
                    let finalResult = simplifyNode(integrate(ast, varName));
                    resultHTML = `<div class="formula">∫ (${toHTML(ast, varName)}) d${varName} = ${toHTML(finalResult, varName)} + C</div>`;
                    
                    let terms = collectTerms(ast);
                    if (terms.length > 1) {
                        resultHTML += `<div style="margin-top:10px; font-weight:600;">Analyse pas à pas des composants :</div>`;
                        terms.forEach((t, idx) => {
                            let prefix = t.sign === -1 ? '− ' : '';
                            let iTerm = simplifyNode(integrate(t.node, varName));
                            resultHTML += `<div class="step"><span class="step-number">[Terme ${idx+1}]</span> ∫ ${prefix}${toHTML(t.node, varName)} d${varName} ➜ ${toHTML(iTerm, varName)}</div>`;
                        });
                    }
                    resultHTML += verifyResult(ast, finalResult, varName, op);
                }
                resultDiv.innerHTML = resultHTML;
            } catch (e) {
                resultDiv.innerHTML = `<span style="color:#f87171">Erreur d'analyse de l'expression : ${e.message}</span>`;
            }
        }

        // ============================================================
        //  ÉVÉNEMENTS ET CONTRÔLE UI
        // ============================================================
        document.getElementById('calcBtn').addEventListener('click', compute);
        document.getElementById('calcClearBtn').addEventListener('click', () => {
            document.getElementById('calcInput').value = '';
            document.getElementById('calcResult').innerHTML = '';
        });
        
        document.querySelectorAll('.mode-tabs button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-tabs button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('calcOperation').value = btn.dataset.mode;
                compute();
            });
        });

        document.querySelectorAll('.calc-examples button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.getElementById('calcInput').value = btn.dataset.expr;
                if (btn.dataset.v) document.getElementById('calcVariable').value = btn.dataset.v;
                else document.getElementById('calcVariable').value = 'x';
                
                document.getElementById('calcOperation').value = btn.dataset.op;
                document.querySelectorAll('.mode-tabs button').forEach(b => {
                    if (b.dataset.mode === btn.dataset.op) b.classList.add('active');
                    else b.classList.remove('active');
                });
                compute();
            });
        });

        // ============================================================
        //  TABLES DE RÉFÉRENCE FORMELLE
        // ============================================================
        const derivativesData = [
            ['k (constante)', '0', 'ℝ'],
            ['x', '1', 'ℝ'],
            ['xⁿ', 'n·xⁿ⁻¹', 'ℝ (n ∈ ℕ) / x ≠ 0 (n < 0)'],
            ['1/x', `<span class="frac"><span class="num">−1</span><span class="den">x²</span></span>`, 'x ≠ 0'],
            ['√x', `<span class="frac"><span class="num">1</span><span class="den">2√x</span></span>`, 'x > 0'],
            ['ln(x)', `<span class="frac"><span class="num">1</span><span class="den">x</span></span>`, 'x > 0'],
            ['exp(x)', 'exp(x)', 'ℝ'],
            ['sin(x)', 'cos(x)', 'ℝ'],
            ['cos(x)', '−sin(x)', 'ℝ'],
            ['tan(x)', '1 + tan²(x) = sec²(x)', 'x ≠ π/2 + kπ'],
            ['cot(x)', '−(1 + cot²(x)) = −csc²(x)', 'x ≠ kπ'],
            ['sec(x)', 'sec(x)·tan(x)', 'x ≠ π/2 + kπ'],
            ['csc(x)', '−csc(x)·cot(x)', 'x ≠ kπ'],
            ['sinh(x)', 'cosh(x)', 'ℝ'],
            ['cosh(x)', 'sinh(x)', 'ℝ'],
            ['arctan(x)', `<span class="frac"><span class="num">1</span><span class="den">1 + x²</span></span>`, 'ℝ'],
            ['arcsin(x)', `<span class="frac"><span class="num">1</span><span class="den">√(1−x²)</span></span>`, '|x|<1']
        ];

        const integralsData = [
            ['k (constante)', 'k·x', 'ℝ'],
            ['xⁿ (n ≠ −1)', `<span class="frac"><span class="num">xⁿ⁺¹</span><span class="den">n + 1</span></span>`, 'ℝ si n ≥ 0'],
            ['1/x', 'ln|x|', 'x ≠ 0'],
            ['exp(x)', 'exp(x)', 'ℝ'],
            ['cos(x)', 'sin(x)', 'ℝ'],
            ['sin(x)', '−cos(x)', 'ℝ'],
            ['tan(x)', '−ln|cos(x)|', 'x ≠ π/2 + kπ'],
            ['cot(x)', 'ln|sin(x)|', 'x ≠ kπ'],
            ['sec(x)', 'ln|sec(x)+tan(x)|', 'x ≠ π/2 + kπ'],
            ['csc(x)', '−ln|csc(x)+cot(x)|', 'x ≠ kπ'],
            ['sinh(x)', 'cosh(x)', 'ℝ'],
            ['cosh(x)', 'sinh(x)', 'ℝ'],
            ['1 / (1 + x²)', 'arctan(x)', 'ℝ']
        ];

        function renderTables() {
            document.getElementById('derivativesTableBody').innerHTML = derivativesData.map(r => `<tr><td><b>${r[0]}</b></td><td>${r[1]}</td><td><small>${r[2]}</small></td></tr>`).join('');
            document.getElementById('integralsTableBody').innerHTML = integralsData.map(r => `<tr><td><b>${r[0]}</b></td><td>${r[1]} + C</td><td><small>${r[2]}</small></td></tr>`).join('');
        }

        document.querySelectorAll('.table-toggle button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.table-toggle button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                let t = btn.dataset.table;
                if (t === 'all') {
                    document.getElementById('derivativesTable').classList.remove('hide-table');
                    document.getElementById('integralsTable').classList.remove('hide-table');
                } else if (t === 'derivatives') {
                    document.getElementById('derivativesTable').classList.remove('hide-table');
                    document.getElementById('integralsTable').classList.add('hide-table');
                } else {
                    document.getElementById('derivativesTable').classList.add('hide-table');
                    document.getElementById('integralsTable').classList.remove('hide-table');
                }
            });
        });

        window.onload = () => { renderTables(); compute(); };
    </script>
</body>
</html>
