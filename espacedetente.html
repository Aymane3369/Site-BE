<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Breaker Fullscreen</title>

<style>
* {
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
}

body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background-color: #0b0f19;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: white;
}

.game-wrapper {
    position: absolute;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

h1 {
    position: absolute;
    top: 10px;
    color: #00f0ff;
    font-size: 20px;
    margin: 0;
}

#scoreDisplay {
    position: absolute;
    top: 40px;
    font-size: 18px;
    color: #ff007f;
    font-weight: bold;
}

canvas {
    background-color: #111827;
    border: 3px solid #00f0ff;
    border-radius: 12px;
    display: block;
}

#winLossMessage {
    position: absolute;
    bottom: 80px;
    font-size: 20px;
    font-weight: bold;
}

button {
    position: absolute;
    bottom: 30px;
    padding: 12px 30px;
    font-size: 16px;
    background-color: #ff007f;
    color: white;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    display: none;
}
</style>
</head>

<body>

<div class="game-wrapper">
    <h1>⚡ NEON BREAKER ⚡</h1>
    <div id="scoreDisplay">SCORE: <span id="score">0</span></div>

    <canvas id="gameCanvas"></canvas>

    <div id="winLossMessage"></div>
    <button id="resetBtn" onclick="resetGame()">PLAY AGAIN 🔄</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// GAME STATE
let score, x, y, dx, dy, paddleX, bricks;
let animationId;

// CONSTANTS
const ballRadius = 8;
const paddleHeight = 12;
const paddleWidth = 90;
const brickRowCount = 5;
const brickColumnCount = 6;
const brickWidth = 60;
const brickHeight = 18;
const brickPadding = 10;
const brickOffsetTop = 60;
const brickOffsetLeft = 30;

function resizeCanvas() {
    canvas.width = window.innerWidth * 0.9;
    canvas.height = window.innerHeight * 0.75;
    paddleX = (canvas.width - paddleWidth) / 2;
}

function initGame() {
    score = 0;

    x = canvas.width / 2;
    y = canvas.height - 60;
    dx = 3;
    dy = -3;

    paddleX = (canvas.width - paddleWidth) / 2;

    bricks = [];
    for (let c = 0; c < brickColumnCount; c++) {
        bricks[c] = [];
        for (let r = 0; r < brickRowCount; r++) {
            bricks[c][r] = { status: 1 };
        }
    }

    document.getElementById("score").innerText = score;
    document.getElementById("winLossMessage").innerText = "";
    document.getElementById("resetBtn").style.display = "none";
}

canvas.addEventListener("touchmove", function (e) {
    e.preventDefault();
    let rect = canvas.getBoundingClientRect();
    let touch = e.touches[0];
    let relativeX = touch.clientX - rect.left;

    if (relativeX > 0 && relativeX < canvas.width) {
        paddleX = relativeX - paddleWidth / 2;
    }
}, { passive: false });

canvas.addEventListener("mousemove", function (e) {
    let rect = canvas.getBoundingClientRect();
    let relativeX = e.clientX - rect.left;
    paddleX = relativeX - paddleWidth / 2;
});

function collisionDetection() {
    for (let c = 0; c < brickColumnCount; c++) {
        for (let r = 0; r < brickRowCount; r++) {
            let b = bricks[c][r];
            if (b.status === 1) {
                let bx = c * (brickWidth + brickPadding) + brickOffsetLeft;
                let by = r * (brickHeight + brickPadding) + brickOffsetTop;

                if (x > bx && x < bx + brickWidth && y > by && y < by + brickHeight) {
                    dy = -dy;
                    b.status = 0;
                    score += 10;
                    document.getElementById("score").innerText = score;

                    if (score === brickRowCount * brickColumnCount * 10) {
                        gameOver("🏆 YOU WIN!", "#00f0ff");
                    }
                }
            }
        }
    }
}

function drawBall() {
    ctx.beginPath();
    ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
    ctx.fillStyle = "#ff007f";
    ctx.fill();
    ctx.closePath();
}

function drawPaddle() {
    ctx.beginPath();
    ctx.rect(paddleX, canvas.height - paddleHeight - 20, paddleWidth, paddleHeight);
    ctx.fillStyle = "#00f0ff";
    ctx.fill();
    ctx.closePath();
}

function drawBricks() {
    for (let c = 0; c < brickColumnCount; c++) {
        for (let r = 0; r < brickRowCount; r++) {
            if (bricks[c][r].status === 1) {
                let bx = c * (brickWidth + brickPadding) + brickOffsetLeft;
                let by = r * (brickHeight + brickPadding) + brickOffsetTop;

                ctx.beginPath();
                ctx.rect(bx, by, brickWidth, brickHeight);
                ctx.fillStyle = "#39ff14";
                ctx.fill();
                ctx.closePath();
            }
        }
    }
}

function gameOver(text, color) {
    document.getElementById("winLossMessage").innerText = text;
    document.getElementById("winLossMessage").style.color = color;
    document.getElementById("resetBtn").style.display = "block";
    cancelAnimationFrame(animationId);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawBricks();
    drawBall();
    drawPaddle();
    collisionDetection();

    if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) dx = -dx;
    if (y + dy < ballRadius) dy = -dy;
    else if (y + dy > canvas.height - ballRadius - 20) {
        if (x > paddleX && x < paddleX + paddleWidth) {
            dy = -dy;
            dx = 6 * ((x - (paddleX + paddleWidth / 2)) / paddleWidth);
        } else {
            gameOver("💥 GAME OVER 💥", "#ff007f");
            return;
        }
    }

    x += dx;
    y += dy;

    animationId = requestAnimationFrame(draw);
}

function resetGame() {
    cancelAnimationFrame(animationId);
    initGame();
    draw();
}

// START
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

initGame();
draw();
</script>

</body>
</html>
